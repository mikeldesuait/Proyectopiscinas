<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Técnico - Prueba</title>
    <style>
        body { font-family: system-ui; max-width: 400px; margin: auto; padding: 20px; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; }
        .oculto { display: none; }
        .log { background: black; color: lime; padding: 10px; font-family: monospace; margin-top: 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>

<div id="loginPanel">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="tecnico@example.com">
    <input type="password" id="password" placeholder="123456">
    <button id="btnLogin">Entrar</button>
    <div id="error" style="color:red;"></div>
</div>

<div id="dashboardPanel" class="oculto">
    <h2>✅ Has entrado correctamente</h2>
    <p>Bienvenido, <span id="nombre"></span></p>
    <button id="logout">Salir</button>
</div>

<div class="log" id="log">Logs:</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://zlaatodfoulhhhvoyrrr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Ow6HYUU0x0Yzhb6UqqR2iQ_xEoTpcAL";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    function log(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `<br>▶ ${new Date().toLocaleTimeString()} - ${msg}`;
        console.log(msg);
    }
    
    document.getElementById('btnLogin').onclick = async () => {
        log("Login clicado");
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        log(`Buscando ${email}`);
        
        const { data, error } = await supabase
            .from('tecnicos')
            .select('*')
            .eq('email', email)
            .eq('password', password)
            .maybeSingle();
        
        if (error) {
            log("Error: " + error.message);
            document.getElementById('error').innerText = error.message;
            return;
        }
        if (!data) {
            log("Credenciales incorrectas");
            document.getElementById('error').innerText = "Email o contraseña incorrectos";
            return;
        }
        log("Login éxito: " + data.nombre);
        document.getElementById('nombre').innerText = data.nombre;
        document.getElementById('loginPanel').classList.add('oculto');
        document.getElementById('dashboardPanel').classList.remove('oculto');
    };
    
    document.getElementById('logout').onclick = () => {
        document.getElementById('loginPanel').classList.remove('oculto');
        document.getElementById('dashboardPanel').classList.add('oculto');
        document.getElementById('error').innerText = '';
        log("Sesión cerrada");
    };
</script>
</body>
</html>
