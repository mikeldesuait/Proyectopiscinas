<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Técnico - Prueba</title>
    <style>
        body { font-family: system-ui; padding: 20px; background: #eef2ff; }
        .card { background: white; border-radius: 28px; padding: 24px; max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; }
        button { background: #0066cc; color: white; font-weight: bold; }
        .oculto { display: none; }
    </style>
</head>
<body>
<div class="card" id="loginCard">
    <h2>Prueba de acceso</h2>
    <input type="text" id="user" placeholder="Cualquier usuario">
    <input type="password" id="pass" placeholder="Cualquier contraseña">
    <button id="btnAcceder">Acceder</button>
    <div id="error"></div>
</div>
<div class="card oculto" id="panelCard">
    <h2>Panel del técnico (simulado)</h2>
    <p>Has accedido correctamente. Aquí irían los formularios de mediciones.</p>
    <button id="salir">Salir</button>
</div>
<script>
    document.getElementById('btnAcceder').onclick = () => {
        document.getElementById('loginCard').classList.add('oculto');
        document.getElementById('panelCard').classList.remove('oculto');
    };
    document.getElementById('salir').onclick = () => {
        document.getElementById('loginCard').classList.remove('oculto');
        document.getElementById('panelCard').classList.add('oculto');
    };
</script>
</body>
</html>
