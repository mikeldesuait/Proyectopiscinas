<!DOCTYPE html>
<html>
<head>
    <title>Login Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <input id="email" placeholder="tecnico@example.com" value="tecnico@example.com">
    <input id="pass" placeholder="123456" value="123456">
    <button id="btn">Login</button>
    <pre id="resultado"></pre>
    <script>
        const SUPABASE_URL = "https://zlaatodfoulhhhvoyrrr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Ow6HYUU0x0Yzhb6UqqR2iQ_xEoTpcAL"; // O mayúscula
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        document.getElementById('btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const { data, error } = await supabase
                .from('tecnicos')
                .select('*')
                .eq('email', email)
                .eq('password', pass);
            if (error) document.getElementById('resultado').innerText = 'Error: ' + error.message;
            else if (data.length === 0) document.getElementById('resultado').innerText = 'Credenciales incorrectas';
            else document.getElementById('resultado').innerText = '✅ Usuario correcto: ' + data[0].nombre;
        };
    </script>
</body>
</html>
