<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gerente · Aqua Garden · Mensajes a Clientes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #eef2ff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,119,182,0.1);
        }
        .card-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #0077b6;
            padding: 12px 14px;
            color: #1e4663;
            cursor: pointer;
            border-radius: 20px;
        }
        .card-header:hover { background: #f8fafc; }
        .card-header .flecha { margin-left: auto; font-size: 1.1rem; }
        .card-content { padding: 16px 0 0 0; }
        button, input, select, textarea {
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #cad2db;
            font-size: 0.85rem;
            background: #fff;
            width: 100%;
            margin: 4px 0;
        }
        button {
            background: #0066cc;
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #0052a3; transform: translateY(-1px); }
        .btn-pdf { background: #c2410c; }
        .btn-buscar { background: #475569; }
        .btn-refresh { background: #2c7a4d; width: auto; padding: 6px 12px; font-size: 0.8rem; }
        .btn-success { background: #2c7a4d; }
        .btn-warning { background: #e67e22; }
        .btn-danger { background: #c2410c; }
        .btn-info { background: #0284c7; }
        .oculto { display: none; }
        
        .gerente-header {
            background: linear-gradient(135deg, #0077b6 0%, #00a8e8 100%);
            color: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .resumen-compacto {
            display: flex;
            gap: 12px;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .resumen-item {
            text-align: center;
            flex: 1;
            min-width: 90px;
            padding: 8px 12px;
            background: #f8fafc;
            border-radius: 20px;
        }
        .resumen-valor {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e4663;
            line-height: 1.2;
        }
        .resumen-label {
            font-size: 0.65rem;
            color: #5b6e8c;
            margin-top: 4px;
        }
        
        .row-flex { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .grupo { flex: 1; min-width: 130px; }
        label { font-size: 0.7rem; font-weight: 600; color: #475569; margin-bottom: 3px; display: block; }
        .medicion-card, .jornada-card, .mensaje-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-left: 3px solid #0077b6;
            font-size: 0.85rem;
        }
        .mensaje-card {
            background: #f0f9ff;
            border-left: 3px solid #2c7a4d;
        }
        .resultados-area { margin-top: 12px; max-height: 400px; overflow-y: auto; }
        @media (max-width: 700px) { .row-flex { flex-direction: column; } }
        
        .browser-tabs {
            display: flex;
            gap: 3px;
            background: #f1f5f9;
            padding: 6px 10px 0 10px;
            border-radius: 14px 14px 0 0;
            border-bottom: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .browser-tab {
            padding: 8px 16px;
            background: #e2e8f0;
            border: none;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.75rem;
            color: #475569;
            transition: all 0.2s;
            width: auto;
            margin: 0;
        }
        .browser-tab:hover {
            background: #cbd5e1;
            transform: none;
        }
        .browser-tab.active {
            background: white;
            color: #0077b6;
            border-top: 2px solid #0077b6;
        }
        .browser-content {
            background: white;
            border-radius: 0 0 16px 16px;
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-top: none;
        }
        .activo-card { background: linear-gradient(135deg, #d4edda 0%, #c8e6d9 100%); border-left: 3px solid #2c7a4d; }
        .urgente { background: #fee2e2; border-left: 3px solid #dc2626; }
        .piscina-trabajo { background: #e0f2fe; border-left: 3px solid #0284c7; }
        .quimico-card { background: #fef3c7; border-left: 3px solid #d97706; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-trabajo { background: #2c7a4d; color: white; }
        .badge-desplazamiento { background: #e67e22; color: white; }
        .badge-descanso { background: #94a3b8; color: white; }
        .badge-cliente { background: #2c7a4d; color: white; }
        
        .mensaje-cliente {
            background: linear-gradient(135deg, #e8f4f8 0%, #d4eaf0 100%);
            border-left: 4px solid #2c7a4d;
            white-space: pre-wrap;
            font-family: monospace;
        }
        
        .btn-recargar {
            background: #2c7a4d;
            width: auto;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .filtros-mensajes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .filtros-mensajes input, .filtros-mensajes select {
            flex: 1;
            min-width: 140px;
        }
        
        #dashboardPanel { display: none; }
    </style>
</head>
<body>
<div class="container">
    <!-- Login -->
    <div id="loginPanel" class="card">
        <div class="card-header" style="cursor:default;">👔 Acceso Gerente · Aqua Garden</div>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnLogin">Iniciar sesión</button>
        <div id="errorMsg" style="color:red; margin-top:10px; font-size:0.8rem;"></div>
    </div>

    <div id="dashboardPanel">
        <!-- Header -->
        <div class="gerente-header">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <div style="font-size: 0.8rem; opacity: 0.8;">👔 Gerente</div>
                    <div style="font-size: 1.5rem; font-weight: 700;" id="nombreGerente">Cargando...</div>
                    <div style="font-size: 0.8rem; opacity: 0.8;" id="emailGerente"></div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 2rem;">🏊</div>
                    <div style="font-size: 0.7rem; opacity: 0.8;">Aqua Garden</div>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 15px;">
                <button id="btnRecargarTodo" class="btn-recargar">🔄 Recargar todos los datos</button>
            </div>
        </div>

        <!-- Resumen -->
        <div class="card" style="padding: 10px 16px;">
            <div class="resumen-compacto">
                <div class="resumen-item">
                    <div class="resumen-valor" id="resumenTecnicosActivos">0</div>
                    <div class="resumen-label">👥 Técnicos activos</div>
                </div>
                <div class="resumen-item">
                    <div class="resumen-valor" id="resumenPiscinasActivas">0</div>
                    <div class="resumen-label">🏊 Piscinas activas</div>
                </div>
                <div class="resumen-item">
                    <div class="resumen-valor" id="resumenActividadesCerradas">0</div>
                    <div class="resumen-label">✅ Actividades cerradas hoy</div>
                </div>
                <div class="resumen-item">
                    <div class="resumen-valor" id="resumenMensajesCliente">0</div>
                    <div class="resumen-label">📨 Mensajes a clientes</div>
                </div>
            </div>
        </div>

        <!-- CONSOLA DE SUPERVISIÓN -->
        <div class="card">
            <div class="refresh-header">
                <div class="card-header" style="cursor:default; margin-bottom:0; padding-left:0; border-left:none;">🎮 Consola de supervisión</div>
                <button id="btnRefreshConsola" class="btn-refresh">🔄 Actualizar</button>
            </div>
            
            <div class="browser-tabs" id="supervisionTabs">
                <button class="browser-tab active" data-tab="activos">👥 Técnicos activos</button>
                <button class="browser-tab" data-tab="piscinas">🏊 Piscinas en trabajo</button>
                <button class="browser-tab" data-tab="cerradas">📋 Actividades cerradas</button>
                <button class="browser-tab" data-tab="quimicos">🧪 Químicos gastados</button>
                <button class="browser-tab" data-tab="mensajes">⚠️ Alertas</button>
                <button class="browser-tab" data-tab="clientes">📨 Mensajes a clientes</button>
            </div>
            
            <div id="tabActivos" class="browser-content"><div id="tecnicosActivosList" class="resultados-area"></div></div>
            <div id="tabPiscinas" class="browser-content oculto"><div id="piscinasTrabajoList" class="resultados-area"></div></div>
            <div id="tabCerradas" class="browser-content oculto"><div id="actividadesCerradasList" class="resultados-area"></div></div>
            <div id="tabQuimicos" class="browser-content oculto"><div id="quimicosGastadosList" class="resultados-area"></div></div>
            <div id="tabMensajes" class="browser-content oculto"><div id="mensajesUrgentesList" class="resultados-area"></div></div>
            <div id="tabClientes" class="browser-content oculto">
                <div class="filtros-mensajes">
                    <input type="date" id="filtroMensajesDesde" placeholder="Desde">
                    <input type="date" id="filtroMensajesHasta" placeholder="Hasta">
                    <select id="filtroMensajesPiscina"><option value="">Todas las piscinas</option></select>
                    <button id="btnFiltrarMensajes" class="btn-buscar">🔍 Filtrar</button>
                    <button id="btnExportarMensajes" class="btn-pdf">📄 Exportar PDF</button>
                </div>
                <div id="mensajesClienteList" class="resultados-area"></div>
            </div>
        </div>

        <!-- CONSOLA DE GESTIÓN DE PERSONAL (mantenemos igual) -->
        <div class="card">
            <div class="card-header" style="cursor:default;">👔 Gestión de personal</div>
            <div class="browser-tabs" id="personalTabs">
                <button class="browser-tab active" data-tab="personal-tecnicos">👥 Datos del técnico</button>
                <button class="browser-tab" data-tab="personal-disponibilidad">📅 Disponibilidad semanal</button>
                <button class="browser-tab" data-tab="personal-vacaciones">🏖️ Vacaciones y ausencias</button>
            </div>
            <div id="tabPersonalTecnicos" class="browser-content">
                <div class="tecnico-selector"><select id="selectorTecnicoPersonal"><option value="">Selecciona un técnico...</option></select><button id="btnCargarDatosPersonal" class="btn-info">📊 Cargar datos</button></div>
                <div id="datosTecnicoHoy" class="resultados-area"></div>
            </div>
            <div id="tabPersonalDisponibilidad" class="browser-content oculto">
                <div class="tecnico-selector"><select id="selectorTecnicoDisponibilidad"><option value="">Selecciona un técnico...</option></select><input type="date" id="semanaDisponibilidad"><button id="btnCargarDisponibilidad" class="btn-info">📅 Cargar semana</button></div>
                <div id="calendarioDisponibilidad" class="calendario"></div><button id="btnGuardarDisponibilidad" class="btn-success">💾 Guardar cambios</button>
            </div>
            <div id="tabPersonalVacaciones" class="browser-content oculto">
                <div class="tecnico-selector"><select id="selectorTecnicoVacaciones"><option value="">Selecciona un técnico...</option></select><button id="btnCargarAusencias" class="btn-info">📋 Cargar datos</button></div>
                <div class="form-ausencia"><h4>➕ Nueva solicitud</h4><div class="row-flex"><div class="grupo"><select id="nuevaAusenciaTipo"><option value="vacaciones">🏖️ Vacaciones</option><option value="baja_medica">🩺 Baja médica</option><option value="permiso">📋 Permiso</option><option value="formacion">📚 Formación</option><option value="reunion">🤝 Reunión</option></select></div><div class="grupo"><input type="date" id="nuevaAusenciaInicio" placeholder="Inicio"></div><div class="grupo"><input type="date" id="nuevaAusenciaFin" placeholder="Fin"></div><div class="grupo"><input type="text" id="nuevaAusenciaObs" placeholder="Observaciones"></div><button id="btnAgregarAusencia" class="btn-success">➕ Agregar</button></div></div>
                <div id="listaAusencias" class="resultados-area"></div>
            </div>
        </div>

        <!-- Históricos -->
        <div class="card">
            <div class="card-header" id="toggleHistorico">📋 Históricos de jornadas, mediciones y tiempos<span class="flecha">▶</span></div>
            <div id="historicoContent" class="card-content oculto">
                <div class="tabs"><button class="tab-btn active" data-tab="jornadas">📋 Jornadas</button><button class="tab-btn" data-tab="mediciones">📊 Mediciones</button><button class="tab-btn" data-tab="tiempos">⏱️ Tiempos</button></div>
                <div id="tabJornadas" class="tab-content active"><div class="row-flex"><div class="grupo"><input type="date" id="jornadaDesde"></div><div class="grupo"><input type="date" id="jornadaHasta"></div><div class="grupo"><select id="filtroTecnicoJornadas"><option value="">Todos</option></select></div><button id="btnBuscarJornadas" class="btn-buscar">🔍 Buscar</button><button id="btnJornadasPDF" class="btn-pdf">📄 PDF</button></div><div id="listaJornadas" class="resultados-area"></div></div>
                <div id="tabMediciones" class="tab-content"><div class="row-flex"><div class="grupo"><input type="date" id="medicionDesde"></div><div class="grupo"><input type="date" id="medicionHasta"></div><div class="grupo"><select id="filtroTecnicoMediciones"><option value="">Todos</option></select></div><button id="btnBuscarMediciones" class="btn-buscar">🔍 Buscar</button><button id="btnMedicionesPDF" class="btn-pdf">📄 PDF</button></div><div id="listaMediciones" class="resultados-area"></div></div>
                <div id="tabTiempos" class="tab-content"><div class="row-flex"><div class="grupo"><input type="date" id="tiemposDesde"></div><div class="grupo"><input type="date" id="tiemposHasta"></div><div class="grupo"><select id="filtroTecnicoTiempos"><option value="">Todos</option></select></div><button id="btnBuscarTiempos" class="btn-buscar">🔍 Buscar</button></div><div id="listaTiempos" class="resultados-area"></div></div>
            </div>
        </div>

        <button id="btnLogout" style="background:#475569; margin-top:16px;">🚪 Cerrar sesión</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://vvdyofbapqttcvczokiw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MwuazhcxSJGc04eS2vttZA_SEcGjhVT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let cachePiscinas = {};
    let cachePerfiles = {};
    let cacheClientes = {};
    let intervaloActualizacion = null;

    function formatDate(iso) { return iso ? new Date(iso).toLocaleString() : '—'; }
    function formatDateShort(iso) { return iso ? new Date(iso).toLocaleDateString() : '—'; }
    function getFechaActual() { return new Date().toISOString().slice(0,10); }

    // ========== INFO GERENTE ==========
    async function cargarInfoGerente() {
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            const { data: perfil } = await sb.from('perfiles').select('nick, nombre').eq('id', user.id).single();
            if (perfil) {
                document.getElementById('nombreGerente').innerHTML = `${perfil.nombre || perfil.nick} 👋`;
                document.getElementById('emailGerente').innerHTML = user.email;
            } else {
                document.getElementById('nombreGerente').innerHTML = user.email.split('@')[0];
                document.getElementById('emailGerente').innerHTML = user.email;
            }
        }
    }

    async function cargarCaches() {
        const { data: piscinas } = await sb.from('piscinas').select('id, nombre');
        piscinas?.forEach(p => cachePiscinas[p.id] = p.nombre);
        const { data: perfiles } = await sb.from('perfiles').select('id, nick, nombre, rol');
        perfiles?.forEach(p => cachePerfiles[p.id] = { nick: p.nick, nombre: p.nombre, rol: p.rol });
        await cargarSelectoresTecnicos();
        await cargarFiltroPiscinasMensajes();
    }

    async function cargarSelectoresTecnicos() {
        const { data: tecnicos } = await sb.from('perfiles').select('id, nick, nombre').eq('rol', 'tecnico');
        const selectores = ['selectorTecnicoPersonal', 'selectorTecnicoDisponibilidad', 'selectorTecnicoVacaciones', 'filtroTecnicoJornadas', 'filtroTecnicoMediciones', 'filtroTecnicoTiempos'];
        for (const id of selectores) {
            const select = document.getElementById(id);
            if (select) {
                select.innerHTML = '<option value="">Selecciona un técnico...</option>';
                tecnicos?.forEach(t => select.innerHTML += `<option value="${t.id}">${t.nick}${t.nombre ? ` - ${t.nombre}` : ''}</option>`);
            }
        }
    }

    async function cargarFiltroPiscinasMensajes() {
        const { data: piscinas } = await sb.from('piscinas').select('id, nombre');
        const select = document.getElementById('filtroMensajesPiscina');
        if (select && piscinas) {
            select.innerHTML = '<option value="">Todas las piscinas</option>';
            piscinas.forEach(p => select.innerHTML += `<option value="${p.id}">${p.nombre}</option>`);
        }
    }

    // ========== NUEVA FUNCIÓN: CARGAR MENSAJES A CLIENTES ==========
    async function cargarMensajesClientes() {
        let desde = document.getElementById('filtroMensajesDesde').value;
        let hasta = document.getElementById('filtroMensajesHasta').value;
        const piscinaId = document.getElementById('filtroMensajesPiscina').value;
        
        if (!desde || !hasta) {
            // Si no hay fechas, mostrar últimos 30 días
            const hoy = new Date();
            const hace30 = new Date();
            hace30.setDate(hoy.getDate() - 30);
            desde = formatDateYMD(hace30);
            hasta = formatDateYMD(hoy);
            document.getElementById('filtroMensajesDesde').value = desde;
            document.getElementById('filtroMensajesHasta').value = hasta;
        }
        
        const start = new Date(`${desde}T00:00:00`).toISOString();
        const end = new Date(`${hasta}T23:59:59`).toISOString();
        
        let query = sb.from('informes_cliente').select('*').gte('created_at', start).lte('created_at', end).order('created_at', { ascending: false });
        if (piscinaId && piscinaId !== '') query = query.eq('piscina_id', parseInt(piscinaId));
        
        const { data: mensajes, error } = await query;
        
        const contenedor = document.getElementById('mensajesClienteList');
        if (error) {
            contenedor.innerHTML = `<div class="mensaje-card">❌ Error: ${error.message}</div>`;
            return;
        }
        
        if (!mensajes || mensajes.length === 0) {
            contenedor.innerHTML = '<div class="mensaje-card">📨 No hay mensajes para clientes en este período</div>';
            document.getElementById('resumenMensajesCliente').innerText = '0';
            return;
        }
        
        document.getElementById('resumenMensajesCliente').innerText = mensajes.length;
        
        contenedor.innerHTML = '';
        for (const m of mensajes) {
            const div = document.createElement('div');
            div.className = 'mensaje-card mensaje-cliente';
            const piscinaNombre = cachePiscinas[m.piscina_id] || '?';
            const tecnico = cachePerfiles[m.tecnico_id];
            const tiempoEspera = m.tiempo_espera || 0;
            const horaRecomendada = m.hora_recomendada || '';
            
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 10px;">
                    <strong>🏊 ${piscinaNombre}</strong>
                    <span class="badge badge-cliente">📅 ${formatDateShort(m.created_at)}</span>
                </div>
                <div style="background: white; border-radius: 16px; padding: 12px; margin: 8px 0; white-space: pre-wrap; font-family: inherit;">
                    ${m.mensaje}
                </div>
                <div style="font-size: 0.7rem; color: #5b6e8c; margin-top: 8px; display: flex; justify-content: space-between; flex-wrap: wrap;">
                    <span>👤 Técnico: ${tecnico?.nick || '?'} ${tecnico?.nombre ? `(${tecnico.nombre})` : ''}</span>
                    ${tiempoEspera > 0 ? `<span>⏰ Tiempo de espera: ${tiempoEspera} horas${horaRecomendada ? ` (desde ${horaRecomendada})` : ''}</span>` : '<span>✅ Baño permitido inmediatamente</span>'}
                </div>
            `;
            contenedor.appendChild(div);
        }
    }

    function formatDateYMD(date) {
        return date.toISOString().slice(0,10);
    }

    // ========== FUNCIONES DE SUPERVISIÓN (ya existentes, simplificadas) ==========
    async function cargarResumenCompacto() {
        const hoy = getFechaActual();
        const startHoy = hoy + 'T00:00:00';
        const endHoy = hoy + 'T23:59:59';
        
        const { data: jornadasActivas } = await sb.from('jornadas').select('tecnico_id').is('fin', null).gte('inicio', startHoy).lte('inicio', endHoy);
        const tecnicosUnicos = new Set(); jornadasActivas?.forEach(j => tecnicosUnicos.add(j.tecnico_id));
        document.getElementById('resumenTecnicosActivos').innerText = tecnicosUnicos.size || 0;
        
        const { data: trabajosActivos } = await sb.from('trabajos_piscina').select('piscina_id').is('fin', null).gte('inicio', startHoy).lte('inicio', endHoy);
        const piscinasUnicas = new Set(); trabajosActivos?.forEach(t => piscinasUnicas.add(t.piscina_id));
        document.getElementById('resumenPiscinasActivas').innerText = piscinasUnicas.size || 0;
        
        const { data: trabajosCerrados } = await sb.from('trabajos_piscina').select('id').gte('fin', startHoy).lte('fin', endHoy);
        const { data: desplazamientosCerrados } = await sb.from('desplazamientos').select('id').gte('fin', startHoy).lte('fin', endHoy);
        document.getElementById('resumenActividadesCerradas').innerText = (trabajosCerrados?.length || 0) + (desplazamientosCerrados?.length || 0);
        
        // Mensajes del día
        const { data: mensajesHoy } = await sb.from('informes_cliente').select('id').gte('created_at', startHoy).lte('created_at', endHoy);
        document.getElementById('resumenMensajesCliente').innerText = mensajesHoy?.length || 0;
    }

    async function cargarTecnicosActivos() {
        const hoy = getFechaActual();
        const startHoy = hoy + 'T00:00:00';
        const endHoy = hoy + 'T23:59:59';
        const { data: jornadasActivas } = await sb.from('jornadas').select('*, tecnico_id').is('fin', null).gte('inicio', startHoy).lte('inicio', endHoy);
        if (!jornadasActivas?.length) { document.getElementById('tecnicosActivosList').innerHTML = '<div class="medicion-card">👨‍🔧 No hay técnicos activos hoy</div>'; return; }
        const contenedor = document.getElementById('tecnicosActivosList');
        contenedor.innerHTML = '';
        for (const jornada of jornadasActivas) {
            const tecnico = cachePerfiles[jornada.tecnico_id];
            if (!tecnico) continue;
            const { data: desplazamiento } = await sb.from('desplazamientos').select('*').eq('jornada_id', jornada.id).is('fin', null).maybeSingle();
            const { data: trabajo } = await sb.from('trabajos_piscina').select('*').eq('jornada_id', jornada.id).is('fin', null).maybeSingle();
            let estado = 'descanso', estadoTexto = '💤 En descanso', badgeClass = 'badge-descanso';
            if (desplazamiento) { estado = 'desplazamiento'; estadoTexto = `🚗 Desplazándose a ${cachePiscinas[desplazamiento.piscina_destino_id] || '?'}`; badgeClass = 'badge-desplazamiento'; }
            else if (trabajo) { estado = 'trabajo'; estadoTexto = `🏊 Trabajando en ${cachePiscinas[trabajo.piscina_id] || '?'}`; badgeClass = 'badge-trabajo'; }
            const div = document.createElement('div'); div.className = 'medicion-card activo-card';
            div.innerHTML = `<div style="display:flex;justify-content:space-between"><strong>👤 ${tecnico.nick}${tecnico.nombre ? ` (${tecnico.nombre})` : ''}</strong><span class="badge ${badgeClass}">${estado === 'trabajo' ? 'TRABAJANDO' : (estado === 'desplazamiento' ? 'DESPLAZÁNDOSE' : 'DESCANSO')}</span></div><div>${estadoTexto}</div><div style="font-size:0.7rem;">🕒 Jornada: ${formatDate(jornada.inicio)}</div>`;
            contenedor.appendChild(div);
        }
    }

    async function cargarPiscinasEnTrabajo() {
        const hoy = getFechaActual();
        const startHoy = hoy + 'T00:00:00';
        const endHoy = hoy + 'T23:59:59';
        const { data: trabajosActivos } = await sb.from('trabajos_piscina').select('*, jornadas!inner(tecnico_id)').is('fin', null).gte('inicio', startHoy).lte('inicio', endHoy);
        const contenedor = document.getElementById('piscinasTrabajoList');
        if (!trabajosActivos?.length) { contenedor.innerHTML = '<div class="medicion-card">✅ No hay trabajos activos</div>'; return; }
        const piscinasMap = new Map();
        for (const trabajo of trabajosActivos) {
            const piscinaNombre = cachePiscinas[trabajo.piscina_id] || '?';
            const tecnico = cachePerfiles[trabajo.jornadas?.tecnico_id];
            if (!piscinasMap.has(trabajo.piscina_id)) piscinasMap.set(trabajo.piscina_id, { nombre: piscinaNombre, tecnicos: [] });
            if (tecnico) piscinasMap.get(trabajo.piscina_id).tecnicos.push({ nick: tecnico.nick, inicio: formatDate(trabajo.inicio) });
        }
        contenedor.innerHTML = '';
        for (const data of piscinasMap.values()) {
            const div = document.createElement('div'); div.className = 'medicion-card piscina-trabajo';
            div.innerHTML = `<strong>🏊 ${data.nombre}</strong><div>${data.tecnicos.map(t => `👤 ${t.nick} (desde ${t.inicio})`).join('<br>')}</div>`;
            contenedor.appendChild(div);
        }
    }

    async function cargarActividadesCerradasHoy() {
        const hoy = getFechaActual();
        const startHoy = hoy + 'T00:00:00';
        const endHoy = hoy + 'T23:59:59';
        const { data: trabajos } = await sb.from('trabajos_piscina').select('*').gte('fin', startHoy).lte('fin', endHoy).order('fin', { ascending: false });
        const { data: desplazamientos } = await sb.from('desplazamientos').select('*').gte('fin', startHoy).lte('fin', endHoy).order('fin', { ascending: false });
        const contenedor = document.getElementById('actividadesCerradasList');
        contenedor.innerHTML = '';
        let hayDatos = false;
        if (trabajos?.length) { hayDatos = true; contenedor.innerHTML += '<div class="medicion-card" style="background:#e0f2e9;font-weight:bold;">🏊 TRABAJOS FINALIZADOS</div>'; trabajos.forEach(t => { const tecnico = cachePerfiles[t.tecnico_id]; const inicio = new Date(t.inicio), fin = new Date(t.fin); const diff = fin - inicio; const horas = Math.floor(diff/3600000), minutos = Math.floor((diff%3600000)/60000); contenedor.innerHTML += `<div class="medicion-card"><strong>👤 ${tecnico?.nick||'?'}</strong> · 🏊 ${cachePiscinas[t.piscina_id]||'?'}<br>🕒 ${formatDate(t.inicio)} → ${formatDate(t.fin)} (${horas}h ${minutos}m)<br>📝 ${t.observaciones||''}</div>`; }); }
        if (desplazamientos?.length) { hayDatos = true; contenedor.innerHTML += '<div class="medicion-card" style="background:#e0f2e9;font-weight:bold;">🚗 DESPLAZAMIENTOS FINALIZADOS</div>'; desplazamientos.forEach(d => { const tecnico = cachePerfiles[d.tecnico_id]; const minutos = Math.floor((new Date(d.fin) - new Date(d.inicio)) / 60000); contenedor.innerHTML += `<div class="medicion-card"><strong>👤 ${tecnico?.nick||'?'}</strong> · 🚗 Hacia ${cachePiscinas[d.piscina_destino_id]||'?'}<br>🕒 ${formatDate(d.inicio)} → ${formatDate(d.fin)} (${minutos} minutos)</div>`; }); }
        if (!hayDatos) contenedor.innerHTML = '<div class="medicion-card">📋 No hay actividades cerradas hoy</div>';
    }

    async function cargarQuimicosGastadosHoy() {
        const hoy = getFechaActual();
        const startHoy = hoy + 'T00:00:00';
        const endHoy = hoy + 'T23:59:59';
        const { data: medicionesHoy } = await sb.from('mediciones').select('id, created_at, piscina_id, tecnico_id').gte('created_at', startHoy).lte('created_at', endHoy);
        if (!medicionesHoy?.length) { document.getElementById('quimicosGastadosList').innerHTML = '<div class="medicion-card">🧪 No hay químicos registrados hoy</div>'; return; }
        const { data: productos } = await sb.from('productos_utilizados').select('*, medicion_id').in('medicion_id', medicionesHoy.map(m => m.id));
        if (!productos?.length) { document.getElementById('quimicosGastadosList').innerHTML = '<div class="medicion-card">🧪 No hay productos registrados</div>'; return; }
        const quimicosMap = new Map();
        for (const prod of productos) { if (!quimicosMap.has(prod.producto_nombre)) quimicosMap.set(prod.producto_nombre, { cantidad: 0, unidad: prod.unidad || 'unidad' }); quimicosMap.get(prod.producto_nombre).cantidad += prod.cantidad || 0; }
        const contenedor = document.getElementById('quimicosGastadosList');
        contenedor.innerHTML = `<div class="medicion-card" style="background:#e0f2e9;font-weight:bold;">📊 TOTAL QUÍMICOS HOY</div><div class="medicion-card quimico-card">${Array.from(quimicosMap.entries()).map(([n,d]) => `🧪 ${n}: ${d.cantidad.toFixed(2)} ${d.unidad}`).join('<br>')}</div>`;
    }

    async function cargarMensajesUrgentes() {
        const ayer = new Date(); ayer.setDate(ayer.getDate() - 1);
        const { data: medicionesRecientes } = await sb.from('mediciones').select('*').gte('created_at', ayer.toISOString()).order('created_at', { ascending: false });
        const contenedor = document.getElementById('mensajesUrgentesList');
        contenedor.innerHTML = '';
        const urgentes = [];
        if (medicionesRecientes) for (const m of medicionesRecientes) { const alertas = []; if (m.cloro < 1) alertas.push('⚠️ Cloro BAJO (< 1 ppm)'); if (m.cloro > 3) alertas.push('⚠️ Cloro ALTO (> 3 ppm)'); if (m.ph < 7.2) alertas.push('⚠️ pH BAJO (< 7.2)'); if (m.ph > 7.8) alertas.push('⚠️ pH ALTO (> 7.8)'); if (m.temperatura > 30) alertas.push('⚠️ Temperatura ALTA (> 30°C)'); if (alertas.length) urgentes.push({ ...m, alertas, tecnico: cachePerfiles[m.tecnico_id], piscina: cachePiscinas[m.piscina_id] }); }
        if (!urgentes.length) { contenedor.innerHTML = '<div class="medicion-card">✅ No hay alertas en las últimas 24h</div>'; return; }
        urgentes.forEach(u => { const div = document.createElement('div'); div.className = 'medicion-card urgente'; div.innerHTML = `<strong>⚠️ ALERTA - ${u.piscina || '?'}</strong><br>👤 Técnico: ${u.tecnico?.nick || '?'}<br>📅 ${formatDate(u.created_at)}<br>${u.alertas.map(a => `🔴 ${a}`).join('<br>')}<br>📝 ${u.observaciones || ''}`; contenedor.appendChild(div); });
    }

    async function actualizarConsolaCompleta() {
        await cargarResumenCompacto();
        await cargarTecnicosActivos();
        await cargarPiscinasEnTrabajo();
        await cargarActividadesCerradasHoy();
        await cargarQuimicosGastadosHoy();
        await cargarMensajesUrgentes();
        await cargarMensajesClientes();
    }

    async function recargarTodosLosDatos() {
        const btn = document.getElementById('btnRecargarTodo');
        btn.innerHTML = '⏳ Cargando...'; btn.disabled = true;
        try {
            await cargarCaches();
            await cargarFiltroPiscinasMensajes();
            await actualizarConsolaCompleta();
            btn.innerHTML = '✅ Actualizado';
            setTimeout(() => { btn.innerHTML = '🔄 Recargar todos los datos'; btn.disabled = false; }, 2000);
        } catch (error) { btn.innerHTML = '❌ Error'; setTimeout(() => { btn.innerHTML = '🔄 Recargar todos los datos'; btn.disabled = false; }, 2000); }
    }

    // ========== LOGIN ==========
    async function hacerLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { document.getElementById('errorMsg').innerText = "Introduce email y contraseña"; return false; }
        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email, password });
        if (authError) { document.getElementById('errorMsg').innerText = authError.message; return false; }
        const { data: perfil } = await sb.from('perfiles').select('rol').eq('id', authData.user.id).single();
        if (!perfil || perfil.rol !== 'gerente') { await sb.auth.signOut(); document.getElementById('errorMsg').innerText = "No tienes permisos de gerente"; return false; }
        currentUser = authData.user;
        return true;
    }

    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            await cargarInfoGerente();
            await cargarCaches();
            await actualizarConsolaCompleta();
            if (intervaloActualizacion) clearInterval(intervaloActualizacion);
            intervaloActualizacion = setInterval(actualizarConsolaCompleta, 60000);
        }
    };

    // Eventos
    document.getElementById('btnRefreshConsola').onclick = actualizarConsolaCompleta;
    document.getElementById('btnRecargarTodo').onclick = recargarTodosLosDatos;
    document.getElementById('btnFiltrarMensajes').onclick = cargarMensajesClientes;
    document.getElementById('btnExportarMensajes').onclick = async () => {
        const contenedor = document.getElementById('mensajesClienteList');
        const contenido = contenedor.innerHTML;
        if (!contenido || contenido.includes('No hay mensajes')) { alert("No hay datos para exportar"); return; }
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = `<h2>Informes a Clientes - Aqua Garden</h2><hr>${contenido}`;
        html2pdf().set({ filename: `mensajes_clientes_${getFechaActual()}.pdf`, margin: 10 }).from(tempDiv).save();
    };
    document.getElementById('btnCargarDatosPersonal').onclick = () => { /* placeholder */ };
    document.getElementById('btnCargarDisponibilidad').onclick = () => { /* placeholder */ };
    document.getElementById('btnGuardarDisponibilidad').onclick = () => { /* placeholder */ };
    document.getElementById('btnCargarAusencias').onclick = () => { /* placeholder */ };
    document.getElementById('btnAgregarAusencia').onclick = () => { /* placeholder */ };
    document.getElementById('btnLogout').onclick = async () => { if (intervaloActualizacion) clearInterval(intervaloActualizacion); await sb.auth.signOut(); location.reload(); };

    // Navegación pestañas
    function initTabs() {
        const supervisionTabs = document.querySelectorAll('#supervisionTabs .browser-tab');
        const supervisionContents = { activos: 'tabActivos', piscinas: 'tabPiscinas', cerradas: 'tabCerradas', quimicos: 'tabQuimicos', mensajes: 'tabMensajes', clientes: 'tabClientes' };
        supervisionTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                supervisionTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.values(supervisionContents).forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('oculto'); });
                const contentId = supervisionContents[tab.dataset.tab];
                if (contentId) document.getElementById(contentId).classList.remove('oculto');
                if (tab.dataset.tab === 'clientes') cargarMensajesClientes();
            });
        });
        const personalTabs = document.querySelectorAll('#personalTabs .browser-tab');
        const personalContents = { 'personal-tecnicos': 'tabPersonalTecnicos', 'personal-disponibilidad': 'tabPersonalDisponibilidad', 'personal-vacaciones': 'tabPersonalVacaciones' };
        personalTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                personalTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.values(personalContents).forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('oculto'); });
                if (personalContents[tab.dataset.tab]) document.getElementById(personalContents[tab.dataset.tab]).classList.remove('oculto');
            });
        });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initTabs);
    else initTabs();

    document.getElementById('toggleHistorico')?.addEventListener('click', () => {
        const content = document.getElementById('historicoContent');
        const flecha = document.querySelector('#toggleHistorico .flecha');
        content.classList.toggle('oculto');
        flecha.innerHTML = content.classList.contains('oculto') ? '▶' : '▼';
    });
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab${btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)}`).classList.add('active');
        });
    });
</script>
