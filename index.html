<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aqua Garden · Panel de control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: white;
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            border-radius: 24px;
            margin: 0 auto 24px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 25px -5px rgba(0,119,182,0.3);
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 8px;
        }
        .subtitulo {
            color: #5b6e8c;
            margin-bottom: 40px;
            font-size: 0.9rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px 24px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            cursor: pointer;
            border: none;
        }
        .btn-tecnico {
            background: #0066cc;
            color: white;
            box-shadow: 0 4px 12px rgba(0,102,204,0.3);
        }
        .btn-tecnico:hover {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,102,204,0.4);
        }
        .btn-gerente {
            background: white;
            color: #1e3a5f;
            border: 2px solid #0066cc;
        }
        .btn-gerente:hover {
            background: #f0f9ff;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 32px;
            font-size: 0.75rem;
            color: #8a99b0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                💧
            </div>
            <h1>Aqua Garden</h1>
            <div class="subtitulo">Gestión de mantenimiento de piscinas</div>
            
            <a href="tecnico.html" class="btn btn-tecnico">
                🔧 Acceso Técnico
            </a>
            
            <a href="gerente.html" class="btn btn-gerente">
                👔 Acceso Gerente
            </a>
            
            <div class="footer">
                Sistema de control de calidad y mantenimiento
            </div>
        </div>
    </div>
</body>
</html>
