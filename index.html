<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aqua Garden · Tu piscina al instante</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
        }
        .card-principal {
            background: white;
            border-radius: 40px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            border-radius: 24px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 25px -5px rgba(0,119,182,0.3);
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1e3a5f;
            margin-bottom: 6px;
        }
        .subtitulo {
            color: #5b6e8c;
            margin-bottom: 28px;
            font-size: 0.85rem;
        }
        
        .acceso-cliente {
            background: linear-gradient(135deg, #0077b6, #00a8e8);
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 28px;
        }
        .input-cliente {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .input-cliente input {
            width: 100%;
            border: none;
            padding: 14px 16px;
            font-size: 1rem;
            border-radius: 50px;
            outline: none;
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            text-align: center;
            background: white;
            border: 1px solid rgba(0,0,0,0.1);
            text-transform: uppercase;
        }
        .input-cliente input:focus {
            border-color: #0077b6;
            box-shadow: 0 0 0 2px rgba(0,119,182,0.2);
        }
        .input-cliente button {
            width: 100%;
            background: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            color: #0077b6;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-cliente button:hover {
            background: #f0f9ff;
            transform: scale(1.02);
        }
        .ayuda-cliente {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.85);
            text-align: center;
            margin-top: 12px;
        }
        .ayuda-cliente span {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 20px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.7rem;
        }
        
        .accesos-secundarios {
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            margin-top: 4px;
        }
        .accesos-secundarios p {
            font-size: 0.7rem;
            color: #8a99b0;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-secundario {
            display: block;
            width: 100%;
            padding: 12px 16px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        .btn-tecnico {
            background: #f1f5f9;
            color: #1e3a5f;
            border: 1px solid #cbd5e1;
        }
        .btn-tecnico:hover {
            background: #e2e8f0;
        }
        .btn-gerente {
            background: #f8fafc;
            color: #475569;
            border: 1px solid #cbd5e1;
        }
        .btn-gerente:hover {
            background: #f1f5f9;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 0.65rem;
            color: #8a99b0;
            text-align: center;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .loading-card {
            background: white;
            border-radius: 32px;
            padding: 28px;
            text-align: center;
            min-width: 220px;
            margin: 0 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #0077b6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-mensaje {
            background: #fee2e2;
            color: #c2410c;
            padding: 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 12px;
        }
        .oculto {
            display: none;
        }
        
        .recordatorio-mayusculas {
            font-size: 0.65rem;
            color: #5b6e8c;
            margin-top: 8px;
            text-align: center;
        }
        
        @media (max-width: 400px) {
            .card-principal {
                padding: 24px 20px;
            }
            .logo {
                width: 55px;
                height: 55px;
                font-size: 28px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
        
        @media (min-width: 768px) {
            .input-cliente {
                flex-direction: row;
            }
            .input-cliente input {
                flex: 2;
            }
            .input-cliente button {
                flex: 1;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-principal">
            <div class="logo">
                💧
            </div>
            <h1>Aqua Garden</h1>
            <div class="subtitulo">
                Consulta el estado de tu piscina
            </div>
            
            <div class="acceso-cliente">
                <div class="input-cliente">
                    <input type="text" id="codigoAcceso" placeholder="Ej: PISC1234" autocomplete="off" maxlength="20" style="text-transform: uppercase;">
                    <button id="btnAccederCliente">Acceder</button>
                </div>
                <div class="ayuda-cliente">
                    Introduce el código de tu comunidad
                </div>
                <div class="recordatorio-mayusculas">
                    🔤 El código debe escribirse en MAYÚSCULAS (ej: PISC1234)
                </div>
            </div>
            
            <div class="accesos-secundarios">
                <p>🔐 Área de trabajo</p>
                <a href="./tecnico.html" class="btn-secundario btn-tecnico">
                    🔧 Acceso Técnico
                </a>
                <a href="./gerente.html" class="btn-secundario btn-gerente">
                    👔 Acceso Gerente
                </a>
            </div>
            
            <div class="footer">
                Sistema de control de calidad y mantenimiento
            </div>
        </div>
    </div>
    
    <div id="loadingModal" class="loading-overlay oculto">
        <div class="loading-card">
            <div class="spinner"></div>
            <div id="loadingMessage">Verificando acceso...</div>
            <div id="errorMessage" class="error-mensaje oculto"></div>
        </div>
    </div>
    
    <!-- Redirección directa a clientes.html con el código en la URL -->
    <form id="redirectForm" action="./clientes.html" method="GET" style="display: none;">
        <input type="text" name="codigo" id="redirectCodigo">
    </form>

    <script>
        const SUPABASE_URL = "https://vvdyofbapqttcvczokiw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MwuazhcxSJGc04eS2vttZA_SEcGjhVT";
        let supabaseClient = null;
        
        const btnAcceder = document.getElementById('btnAccederCliente');
        const inputCodigo = document.getElementById('codigoAcceso');
        const modal = document.getElementById('loadingModal');
        const loadingMsg = document.getElementById('loadingMessage');
        const errorMsgDiv = document.getElementById('errorMessage');
        
        // Convertir a mayúsculas automáticamente mientras escribe
        inputCodigo.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
        
        function mostrarLoading(mensaje) {
            loadingMsg.innerText = mensaje;
            errorMsgDiv.classList.add('oculto');
            modal.classList.remove('oculto');
        }
        
        function ocultarLoading() {
            modal.classList.add('oculto');
        }
        
        function mostrarError(mensaje) {
            loadingMsg.innerText = 'Error de acceso';
            errorMsgDiv.innerText = mensaje;
            errorMsgDiv.classList.remove('oculto');
            setTimeout(() => {
                ocultarLoading();
            }, 2500);
        }
        
        async function verificarYRedirigir() {
            const codigo = inputCodigo.value.trim().toUpperCase();
            
            if (!codigo) {
                alert('Por favor, introduce el código de acceso');
                return;
            }
            
            if (!supabaseClient) {
                mostrarError('Cargando sistema, intenta de nuevo...');
                return;
            }
            
            mostrarLoading('Verificando código...');
            
            try {
                const { data, error } = await supabaseClient
                    .from('piscinas')
                    .select('id, nombre, codigo_acceso')
                    .eq('codigo_acceso', codigo)
                    .maybeSingle();
                
                if (error) throw error;
                
                if (!data) {
                    mostrarError('❌ Código incorrecto. Verifica que esté en MAYÚSCULAS.');
                    return;
                }
                
                // Redirigir a clientes.html con el código en la URL
                window.location.href = `./clientes.html?codigo=${codigo}`;
                
            } catch (error) {
                console.error('Error:', error);
                mostrarError('❌ Error de conexión. Intenta de nuevo.');
            }
        }
        
        // Cargar Supabase
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = () => {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        };
        document.head.appendChild(script);
        
        function esperarSupabase() {
            return new Promise((resolve) => {
                if (supabaseClient) {
                    resolve();
                } else {
                    const interval = setInterval(() => {
                        if (supabaseClient) {
                            clearInterval(interval);
                            resolve();
                        }
                    }, 100);
                }
            });
        }
        
        btnAcceder.addEventListener('click', async () => {
            await esperarSupabase();
            verificarYRedirigir();
        });
        
        inputCodigo.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                await esperarSupabase();
                verificarYRedirigir();
            }
        });
    </script>
</body>
</html>
