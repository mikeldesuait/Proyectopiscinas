<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Técnico - Productos químicos</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: auto; padding: 20px; background: #eef2ff; }
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0066cc; color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-jornada { background: #2c7a4d; }
        .btn-fin { background: #c2410c; }
        .btn-buscar { background: #6c757d; }
        .estado-jornada { background: #f0f0f0; padding: 12px; border-radius: 24px; margin: 16px 0; text-align: center; font-weight: bold; }
        .activa { background: #d4edda; color: #155724; }
        .inactiva { background: #f8d7da; color: #721c24; }
        .mensaje { margin-top: 20px; padding: 12px; border-radius: 20px; text-align: center; }
        .correcto { background: #d4edda; color: #155724; }
        .incorrecto { background: #f8d7da; color: #721c24; }
        .oculto { display: none; }
        hr { margin: 20px 0; }
        .buscar-container { display: flex; gap: 8px; align-items: center; }
        .buscar-container input { flex: 1; margin: 0; }
        .buscar-container button { width: auto; padding: 12px 16px; margin: 0; }
        .producto-item { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: #f9f9f9; padding: 12px; border-radius: 24px; margin-bottom: 12px; }
        .producto-item select, .producto-item input { width: auto; flex: 1; margin: 0; min-width: 100px; }
        .quitar-producto { background: #c2410c; width: auto; padding: 8px 16px; margin: 0; }
        .agregar-producto { background: #2c7a4d; margin-top: 8px; }
        .fecha-buscar { display: flex; gap: 8px; margin: 16px 0; }
        .fecha-buscar input { flex: 1; margin: 0; }
        .fecha-buscar button { width: auto; padding: 12px 20px; }
        .lista-mediciones li { background: #f9f9f9; margin: 8px 0; padding: 10px; border-radius: 16px; }
    </style>
</head>
<body>

<div id="loginPanel" class="card">
    <h2>🔐 Acceso Técnico</h2>
    <input type="email" id="email" placeholder="tecnico@example.com" value="tecnico@example.com">
    <input type="password" id="password" placeholder="123456" value="123456">
    <button id="btnLogin">Iniciar sesión</button>
    <div id="loginMensaje"></div>
</div>

<div id="dashboardPanel" class="card oculto">
    <h2>📋 Panel de Control</h2>
    <p>Bienvenido, <span id="nombreTecnico"></span></p>
    <hr>

    <!-- Jornada -->
    <div id="jornadaContainer">
        <div id="estadoJornada" class="estado-jornada inactiva">⚠️ Jornada no iniciada</div>
        <button id="btnIniciarJornada" class="btn-jornada">🟢 Iniciar jornada</button>
        <button id="btnFinalizarJornada" class="btn-fin oculto">🔴 Finalizar jornada</button>
    </div>

    <!-- Formulario nueva medición (solo si jornada activa) -->
    <div id="medicionesContainer" class="oculto">
        <h3>📝 Registrar medición</h3>
        <label>🏊 Piscina</label>
        <div class="buscar-container">
            <input type="text" id="buscarPiscina" placeholder="Escribe el nombre de la piscina...">
            <button id="btnBuscarPiscina" class="btn-buscar">🔍 Buscar</button>
        </div>
        <select id="piscinaId"></select>

        <input type="number" step="0.1" id="nuevoCloro" placeholder="Cloro (ppm)">
        <input type="number" step="0.1" id="nuevoPh" placeholder="pH">
        <input type="number" id="nuevaTemp" placeholder="Temperatura (°C)">
        <textarea id="nuevasObservaciones" rows="2" placeholder="Observaciones (opcional)"></textarea>

        <!-- Sección de productos químicos -->
        <label style="font-weight: bold; margin-top: 16px;">🧴 Productos químicos usados</label>
        <div id="productosContainer">
            <div id="listaProductos"></div>
            <button type="button" id="agregarProducto" class="agregar-producto">➕ Añadir producto</button>
        </div>

        <button id="btnRegistrar">💾 Enviar medición</button>
        <div id="mensajeExito"></div>
    </div>

    <!-- Buscador por fecha -->
    <hr>
    <h3>📅 Consultar mediciones por fecha</h3>
    <div class="fecha-buscar">
        <input type="date" id="fechaConsulta">
        <button id="btnBuscarFecha">Ver mediciones del día</button>
    </div>
    <ul id="listaPorFecha" style="list-style: none; padding: 0;"></ul>

    <!-- Últimas 5 mediciones -->
    <hr>
    <h3>📜 Últimas 5 mediciones</h3>
    <ul id="listaUltimasMediciones" style="list-style: none; padding: 0;"></ul>

    <button id="btnLogout" style="background: #c2410c; margin-top: 20px;">🚪 Cerrar sesión</button>
</div>

<script>
    const SUPABASE_URL = "https://zlaatodfoulhhhvoyrrr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ow6HYUU0x0Yzhb6UqqR2iQ_xEoTpcAL";
    let tecnicoActual = null;
    let jornadaActiva = null;
    let piscinasList = [];
    let productosTemp = [];  // productos de la nueva medición

    const productosDisponibles = [
        "Cloro granulado", "Cloro pastillas", "pH+ (aumentador)", "pH- (disminuidor)",
        "Floculante", "Alguicida", "Aclarante", "Anticalcáreo", "Oxígeno activo", "Otro"
    ];

    // ----- UTILIDADES -----
    function formatLocalDate(isoString) {
        if (!isoString) return '';
        return new Intl.DateTimeFormat('es-ES', {
            timeZone: 'Europe/Madrid',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        }).format(new Date(isoString));
    }

    async function callSupabase(endpoint, options = {}) {
        const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };
        if (options.method === 'POST') headers['Prefer'] = 'return=representation';
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) {
            let errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText}`);
        }
        if (response.status === 204 || response.headers.get('content-length') === '0') return null;
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) return null;
        return response.json();
    }

    // ----- PISCINAS -----
    async function cargarPiscinas() {
        try {
            piscinasList = await callSupabase('piscinas?order=nombre.asc');
            const select = document.getElementById('piscinaId');
            select.innerHTML = '<option value="">Selecciona una piscina</option>';
            piscinasList.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = `${p.nombre} (${p.ubicacion || 'sin ubicación'})`;
                select.appendChild(option);
            });
        } catch (err) {
            console.error("Error cargando piscinas:", err);
        }
    }

    // Buscador de piscina por nombre
    document.getElementById('btnBuscarPiscina').onclick = () => {
        const texto = document.getElementById('buscarPiscina').value.toLowerCase();
        const select = document.getElementById('piscinaId');
        for (let i = 0; i < select.options.length; i++) {
            const optionText = select.options[i].text.toLowerCase();
            if (optionText.includes(texto)) {
                select.selectedIndex = i;
                break;
            }
        }
    };

    // ----- JORNADA -----
    async function cargarJornadaActiva() {
        if (!tecnicoActual) return;
        try {
            const data = await callSupabase(`jornadas?tecnico_id=eq.${tecnicoActual.id}&fin=is.null&order=inicio.desc&limit=1`);
            jornadaActiva = (data && data.length) ? data[0] : null;
            actualizarUIJornada();
        } catch (err) { console.error(err); }
    }

    function actualizarUIJornada() {
        const estadoDiv = document.getElementById('estadoJornada');
        const btnIniciar = document.getElementById('btnIniciarJornada');
        const btnFinalizar = document.getElementById('btnFinalizarJornada');
        const medicionesContainer = document.getElementById('medicionesContainer');
        if (jornadaActiva) {
            estadoDiv.innerHTML = `✅ Jornada activa desde ${formatLocalDate(jornadaActiva.inicio)}`;
            estadoDiv.className = "estado-jornada activa";
            btnIniciar.classList.add('oculto');
            btnFinalizar.classList.remove('oculto');
            medicionesContainer.classList.remove('oculto');
        } else {
            estadoDiv.innerHTML = "⚠️ Jornada no iniciada";
            estadoDiv.className = "estado-jornada inactiva";
            btnIniciar.classList.remove('oculto');
            btnFinalizar.classList.add('oculto');
            medicionesContainer.classList.add('oculto');
        }
    }

    document.getElementById('btnIniciarJornada').onclick = async () => {
        try {
            const nueva = await callSupabase('jornadas', {
                method: 'POST',
                body: JSON.stringify({ tecnico_id: tecnicoActual.id, inicio: new Date().toISOString() })
            });
            if (nueva && nueva[0]) {
                jornadaActiva = nueva[0];
                actualizarUIJornada();
                document.getElementById('mensajeExito').innerText = "✅ Jornada iniciada";
            }
        } catch (err) {
            document.getElementById('mensajeExito').innerText = "❌ Error: " + err.message;
        }
    };

    document.getElementById('btnFinalizarJornada').onclick = async () => {
        if (!jornadaActiva) return;
        try {
            await callSupabase(`jornadas?id=eq.${jornadaActiva.id}`, {
                method: 'PATCH',
                body: JSON.stringify({ fin: new Date().toISOString() })
            });
            jornadaActiva = null;
            actualizarUIJornada();
            document.getElementById('mensajeExito').innerText = "✅ Jornada finalizada";
        } catch (err) {
            document.getElementById('mensajeExito').innerText = "❌ Error: " + err.message;
        }
    };

    // ----- GESTIÓN DE PRODUCTOS TEMPORALES -----
    function renderizarProductos() {
        const contenedor = document.getElementById('listaProductos');
        contenedor.innerHTML = '';
        productosTemp.forEach((prod, idx) => {
            const div = document.createElement('div');
            div.className = 'producto-item';
            div.innerHTML = `
                <select data-idx="${idx}" class="prod-nombre">
                    ${productosDisponibles.map(p => `<option value="${p}" ${prod.nombre === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
                <input type="number" step="0.01" data-idx="${idx}" class="prod-cantidad" placeholder="Cantidad" value="${prod.cantidad || ''}">
                <select data-idx="${idx}" class="prod-unidad">
                    <option value="gramos" ${prod.unidad === 'gramos' ? 'selected' : ''}>gramos</option>
                    <option value="pastillas" ${prod.unidad === 'pastillas' ? 'selected' : ''}>pastillas</option>
                    <option value="litros" ${prod.unidad === 'litros' ? 'selected' : ''}>litros</option>
                    <option value="mililitros" ${prod.unidad === 'mililitros' ? 'selected' : ''}>mililitros</option>
                </select>
                <button class="quitar-producto" data-idx="${idx}">✖</button>
            `;
            contenedor.appendChild(div);
        });
        // Asignar eventos
        document.querySelectorAll('.prod-nombre').forEach(sel => {
            sel.addEventListener('change', (e) => productosTemp[e.target.dataset.idx].nombre = e.target.value);
        });
        document.querySelectorAll('.prod-cantidad').forEach(inp => {
            inp.addEventListener('input', (e) => productosTemp[e.target.dataset.idx].cantidad = parseFloat(e.target.value) || 0);
        });
        document.querySelectorAll('.prod-unidad').forEach(sel => {
            sel.addEventListener('change', (e) => productosTemp[e.target.dataset.idx].unidad = e.target.value);
        });
        document.querySelectorAll('.quitar-producto').forEach(btn => {
            btn.addEventListener('click', (e) => {
                productosTemp.splice(parseInt(e.target.dataset.idx), 1);
                renderizarProductos();
            });
        });
    }

    document.getElementById('agregarProducto').onclick = () => {
        productosTemp.push({ nombre: "Cloro granulado", cantidad: 0, unidad: "gramos" });
        renderizarProductos();
    };

    // ----- REGISTRAR MEDICIÓN (con productos) -----
    document.getElementById('btnRegistrar').onclick = async () => {
        if (!jornadaActiva) {
            document.getElementById('mensajeExito').innerText = "⚠️ Inicia la jornada primero";
            return;
        }
        const piscinaId = document.getElementById('piscinaId').value;
        if (!piscinaId) {
            document.getElementById('mensajeExito').innerText = "⚠️ Selecciona una piscina";
            return;
        }
        const cloro = parseFloat(document.getElementById('nuevoCloro').value);
        const ph = parseFloat(document.getElementById('nuevoPh').value);
        const temperatura = parseInt(document.getElementById('nuevaTemp').value);
        if (isNaN(cloro) || isNaN(ph) || isNaN(temperatura)) {
            document.getElementById('mensajeExito').innerText = "⚠️ Rellena cloro, pH y temperatura";
            return;
        }
        const observaciones = document.getElementById('nuevasObservaciones').value.trim() || null;

        try {
            // 1. Insertar medición
            const nuevaMedicion = await callSupabase('mediciones', {
                method: 'POST',
                body: JSON.stringify({
                    tecnico_id: tecnicoActual.id,
                    piscina_id: piscinaId,
                    jornada_id: jornadaActiva.id,
                    cloro, ph, temperatura, observaciones
                })
            });
            if (!nuevaMedicion || !nuevaMedicion[0]) throw new Error("No se pudo crear medición");
            const medicionId = nuevaMedicion[0].id;

            // 2. Insertar productos
            for (const prod of productosTemp) {
                if (prod.cantidad && prod.cantidad > 0) {
                    await callSupabase('productos_utilizados', {
                        method: 'POST',
                        body: JSON.stringify({
                            medicion_id: medicionId,
                            producto_nombre: prod.nombre,
                            cantidad: prod.cantidad,
                            unidad: prod.unidad
                        })
                    });
                }
            }

            document.getElementById('mensajeExito').innerText = "✅ Medición y productos guardados";
            // Limpiar formulario
            document.getElementById('nuevoCloro').value = '';
            document.getElementById('nuevoPh').value = '';
            document.getElementById('nuevaTemp').value = '';
            document.getElementById('nuevasObservaciones').value = '';
            productosTemp = [];
            renderizarProductos();
            // Actualizar los dos listados
            cargarUltimasMediciones();
        } catch (err) {
            document.getElementById('mensajeExito').innerText = "❌ Error: " + err.message;
        }
    };

    // ----- CARGAR ÚLTIMAS 5 MEDICIONES (con productos) -----
    async function cargarUltimasMediciones() {
        if (!tecnicoActual) return;
        try {
            const mediciones = await callSupabase(`mediciones?tecnico_id=eq.${tecnicoActual.id}&order=created_at.desc&limit=5`);
            const lista = document.getElementById('listaUltimasMediciones');
            lista.innerHTML = '';
            if (!mediciones || mediciones.length === 0) {
                lista.innerHTML = '<li>No hay mediciones</li>';
                return;
            }
            for (const m of mediciones) {
                // obtener nombre piscina
                let piscinaNombre = '';
                if (m.piscina_id) {
                    const piscinaData = await callSupabase(`piscinas?id=eq.${m.piscina_id}&select=nombre`);
                    if (piscinaData && piscinaData.length) piscinaNombre = piscinaData[0].nombre;
                }
                // obtener productos asociados
                const productos = await callSupabase(`productos_utilizados?medicion_id=eq.${m.id}`);
                let productosHtml = '';
                if (productos && productos.length) {
                    productosHtml = `<br><small>🧴 Productos: ${productos.map(p => `${p.cantidad} ${p.unidad} de ${p.producto_nombre}`).join(', ')}</small>`;
                }
                const li = document.createElement('li');
                li.className = 'lista-mediciones';
                li.innerHTML = `
                    <strong>🏊 ${piscinaNombre}</strong><br>
                    🧪 Cloro ${m.cloro} | ⚗️ pH ${m.ph} | 🌡️ ${m.temperatura}°C<br>
                    📝 ${m.observaciones || 'Sin observaciones'}<br>
                    <small>${formatLocalDate(m.created_at)}</small>
                    ${productosHtml}
                `;
                lista.appendChild(li);
            }
        } catch (err) { console.error(err); }
    }

    // ----- CONSULTAR MEDICIONES POR FECHA (con productos) -----
    document.getElementById('btnBuscarFecha').onclick = async () => {
        const fecha = document.getElementById('fechaConsulta').value;
        if (!fecha) {
            alert("Selecciona una fecha");
            return;
        }
        // rango desde las 00:00 hasta las 23:59:59 en zona local, luego convertir a UTC para consulta
        const startLocal = new Date(`${fecha}T00:00:00`);
        const endLocal = new Date(`${fecha}T23:59:59`);
        // Convertir a ISO string
        const startUTC = new Date(startLocal.getTime() - startLocal.getTimezoneOffset() * 60000).toISOString();
        const endUTC = new Date(endLocal.getTime() - endLocal.getTimezoneOffset() * 60000).toISOString();
        try {
            const mediciones = await callSupabase(`mediciones?tecnico_id=eq.${tecnicoActual.id}&created_at=gte.${startUTC}&created_at=lte.${endUTC}&order=created_at.desc`);
            const lista = document.getElementById('listaPorFecha');
            lista.innerHTML = '';
            if (!mediciones || mediciones.length === 0) {
                lista.innerHTML = '<li>No hay mediciones en esta fecha</li>';
                return;
            }
            for (const m of mediciones) {
                let piscinaNombre = '';
                if (m.piscina_id) {
                    const piscinaData = await callSupabase(`piscinas?id=eq.${m.piscina_id}&select=nombre`);
                    if (piscinaData && piscinaData.length) piscinaNombre = piscinaData[0].nombre;
                }
                const productos = await callSupabase(`productos_utilizados?medicion_id=eq.${m.id}`);
                let productosHtml = '';
                if (productos && productos.length) {
                    productosHtml = `<br><small>🧴 Productos: ${productos.map(p => `${p.cantidad} ${p.unidad} de ${p.producto_nombre}`).join(', ')}</small>`;
                }
                const li = document.createElement('li');
                li.className = 'lista-mediciones';
                li.innerHTML = `
                    <strong>🏊 ${piscinaNombre}</strong><br>
                    🧪 Cloro ${m.cloro} | ⚗️ pH ${m.ph} | 🌡️ ${m.temperatura}°C<br>
                    📝 ${m.observaciones || 'Sin observaciones'}<br>
                    <small>${formatLocalDate(m.created_at)}</small>
                    ${productosHtml}
                `;
                lista.appendChild(li);
            }
        } catch (err) {
            console.error(err);
            document.getElementById('listaPorFecha').innerHTML = `<li>Error: ${err.message}</li>`;
        }
    };

    // ----- LOGIN -----
    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const mensajeDiv = document.getElementById('loginMensaje');
        try {
            const data = await callSupabase(`tecnicos?email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(password)}`);
            if (!data || data.length === 0) {
                mensajeDiv.innerHTML = "❌ Usuario o contraseña incorrectos";
                mensajeDiv.className = "mensaje incorrecto";
                return;
            }
            tecnicoActual = data[0];
            mensajeDiv.innerHTML = "";
            document.getElementById('loginPanel').classList.add('oculto');
            document.getElementById('dashboardPanel').classList.remove('oculto');
            document.getElementById('nombreTecnico').innerText = tecnicoActual.nombre;
            await cargarPiscinas();
            await cargarJornadaActiva();
            await cargarUltimasMediciones();
        } catch (err) {
            mensajeDiv.innerHTML = "❌ Error: " + err.message;
            mensajeDiv.className = "mensaje incorrecto";
        }
    };

    document.getElementById('btnLogout').onclick = () => {
        tecnicoActual = null;
        jornadaActiva = null;
        document.getElementById('loginPanel').classList.remove('oculto');
        document.getElementById('dashboardPanel').classList.add('oculto');
        document.getElementById('loginMensaje').innerHTML = '';
    };
</script>
</body>
</html>
