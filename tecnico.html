<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Técnico</title>
    <style>
        body { font-family: system-ui; max-width: 500px; margin: auto; padding: 20px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; }
        button { background: #0066cc; color: white; font-weight: bold; border: none; cursor: pointer; }
        .mensaje { margin-top: 20px; padding: 12px; border-radius: 20px; text-align: center; }
        .correcto { background: #d4edda; color: #155724; }
        .incorrecto { background: #f8d7da; color: #721c24; }
        .oculto { display: none; }
    </style>
</head>
<body>

<div id="loginPanel">
    <h2>🔐 Acceso Técnico</h2>
    <input type="email" id="email" placeholder="tecnico@example.com" value="tecnico@example.com">
    <input type="password" id="password" placeholder="123456" value="123456">
    <button id="btnLogin">Iniciar sesión</button>
    <div id="loginMensaje"></div>
</div>

<div id="dashboardPanel" class="oculto">
    <h2>📋 Panel de Control</h2>
    <p>Bienvenido, <span id="nombreTecnico"></span></p>
    <hr>
    <h3>📝 Nueva medición</h3>
    <input type="number" step="0.1" id="nuevoCloro" placeholder="Cloro (ppm)">
    <input type="number" step="0.1" id="nuevoPh" placeholder="pH">
    <input type="number" id="nuevaTemp" placeholder="Temperatura (°C)">
    <button id="btnRegistrar">💾 Registrar</button>
    <div id="mensajeExito"></div>
    <h3>📜 Últimas mediciones</h3>
    <ul id="listaMediciones" style="list-style: none; padding: 0;"></ul>
    <button id="btnLogout">🚪 Cerrar sesión</button>
</div>

<script>
    // === CONFIGURACIÓN ===
    const SUPABASE_URL = "https://zlaatodfoulhhhvoyrrr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ow6HYUU0x0Yzhb6UqqR2iQ_xEoTpcAL"; // O mayúscula
    
    let tecnicoActual = null;
    
    // Función para llamar a la API REST de Supabase
    async function callSupabase(endpoint, options = {}) {
        const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };
        const response = await fetch(url, { ...options, headers });
        if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
        return response.json();
    }
    
    // Login
    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const mensajeDiv = document.getElementById('loginMensaje');
        
        try {
            const data = await callSupabase(`tecnicos?email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(password)}`);
            if (data.length === 0) {
                mensajeDiv.innerHTML = "❌ Usuario o contraseña incorrectos";
                mensajeDiv.className = "mensaje incorrecto";
                return;
            }
            tecnicoActual = data[0];
            mensajeDiv.innerHTML = "";
            document.getElementById('loginPanel').classList.add('oculto');
            document.getElementById('dashboardPanel').classList.remove('oculto');
            document.getElementById('nombreTecnico').innerText = tecnicoActual.nombre;
            cargarMediciones();
        } catch (err) {
            mensajeDiv.innerHTML = "❌ Error: " + err.message;
            mensajeDiv.className = "mensaje incorrecto";
        }
    };
    
    async function cargarMediciones() {
        if (!tecnicoActual) return;
        try {
            const data = await callSupabase(`mediciones?tecnico_id=eq.${tecnicoActual.id}&order=created_at.desc&limit=10`);
            const lista = document.getElementById('listaMediciones');
            lista.innerHTML = '';
            data.forEach(m => {
                const li = document.createElement('li');
                li.style.background = '#f9f9f9';
                li.style.margin = '8px 0';
                li.style.padding = '10px';
                li.style.borderRadius = '16px';
                li.innerHTML = `🧪 Cloro ${m.cloro} | ⚗️ pH ${m.ph} | 🌡️ ${m.temperatura}°C<br><small>${new Date(m.created_at).toLocaleString()}</small>`;
                lista.appendChild(li);
            });
        } catch (err) {
            console.error(err);
        }
    }
    
    document.getElementById('btnRegistrar').onclick = async () => {
        if (!tecnicoActual) return;
        const cloro = parseFloat(document.getElementById('nuevoCloro').value);
        const ph = parseFloat(document.getElementById('nuevoPh').value);
        const temperatura = parseInt(document.getElementById('nuevaTemp').value);
        if (isNaN(cloro) || isNaN(ph) || isNaN(temperatura)) {
            document.getElementById('mensajeExito').innerText = '⚠️ Rellena todos los campos';
            return;
        }
        try {
            await callSupabase('mediciones', {
                method: 'POST',
                body: JSON.stringify({
                    tecnico_id: tecnicoActual.id,
                    cloro, ph, temperatura
                })
            });
            document.getElementById('mensajeExito').innerText = '✅ Medición guardada';
            document.getElementById('nuevoCloro').value = '';
            document.getElementById('nuevoPh').value = '';
            document.getElementById('nuevaTemp').value = '';
            cargarMediciones();
        } catch (err) {
            document.getElementById('mensajeExito').innerText = '❌ Error: ' + err.message;
        }
    };
    
    document.getElementById('btnLogout').onclick = () => {
        tecnicoActual = null;
        document.getElementById('loginPanel').classList.remove('oculto');
        document.getElementById('dashboardPanel').classList.add('oculto');
        document.getElementById('loginMensaje').innerHTML = '';
    };
</script>
</body>
</html>
