<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Técnico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: auto; padding: 20px; background: #eef2ff; }
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0066cc; color: white; font-weight: bold; border: none; cursor: pointer; }
        .oculto { display: none; }
    </style>
</head>
<body>

<div id="loginPanel" class="card">
    <h2>🔐 Acceso Técnico</h2>
    <input type="text" id="nick" placeholder="Nick (ej: tecnico)">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnLogin">Iniciar sesión</button>
    <div id="errorMsg" style="color:red;"></div>
</div>

<div id="dashboardPanel" class="card oculto">
    <h2>📋 Panel de Control</h2>
    <p>Bienvenido, <span id="nombreTecnico"></span></p>
    <button id="btnLogout">Cerrar sesión</button>
    <hr>
    <h3>Registrar medición</h3>
    <select id="piscinaSelect"></select>
    <input type="number" step="0.1" id="cloro" placeholder="Cloro (ppm)">
    <input type="number" step="0.1" id="ph" placeholder="pH">
    <input type="number" id="temp" placeholder="Temperatura (°C)">
    <textarea id="obs" rows="2" placeholder="Observaciones"></textarea>
    <button id="btnGuardar">Guardar medición</button>
    <div id="mensaje"></div>
    <h3>Últimas 5 mediciones</h3>
    <ul id="listaMediciones" style="list-style: none; padding: 0;"></ul>
</div>

<script>
    // Configuración
    const SUPABASE_URL = "https://zlaatodfoulhhhvoyrrr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ow6HYUU0x0Yzhb6UqqR2iQ_xEoTpcAL";
    const DOMINIO = "@mipiscina.com";

    // Creamos UNA SOLA instancia del cliente
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;
    let currentUserId = null;

    // Función para llamar a la API REST (opcional, pero útil si prefieres fetch)
    async function callAPI(endpoint, method = 'GET', body = null) {
        const url = `${SUPABASE_URL}/rest/v1/${endpoint}`;
        const headers = {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        if (res.status === 204) return null;
        return res.json();
    }

    // Cargar piscinas en el select
    async function cargarPiscinas() {
        const { data, error } = await supabase
            .from('piscinas')
            .select('*')
            .order('nombre');
        if (error) return console.error(error);
        const select = document.getElementById('piscinaSelect');
        select.innerHTML = '<option value="">Selecciona piscina</option>';
        data.forEach(p => {
            const option = document.createElement('option');
            option.value = p.id;
            option.textContent = `${p.nombre} (${p.ubicacion || ''})`;
            select.appendChild(option);
        });
    }

    // Cargar últimas 5 mediciones del técnico
    async function cargarUltimasMediciones() {
        const { data, error } = await supabase
            .from('mediciones')
            .select('*, piscinas(nombre)')
            .eq('tecnico_id', currentUserId)
            .order('created_at', { ascending: false })
            .limit(5);
        if (error) return console.error(error);
        const lista = document.getElementById('listaMediciones');
        lista.innerHTML = '';
        if (!data || data.length === 0) {
            lista.innerHTML = '<li>No hay mediciones</li>';
            return;
        }
        for (let m of data) {
            const nombrePiscina = m.piscinas ? m.piscinas.nombre : '?';
            const li = document.createElement('li');
            li.style.background = '#f9f9f9';
            li.style.margin = '8px 0';
            li.style.padding = '10px';
            li.style.borderRadius = '16px';
            li.innerHTML = `<strong>${nombrePiscina}</strong><br>🧪 Cloro ${m.cloro} | ⚗️ pH ${m.ph} | 🌡️ ${m.temperatura}°C<br>
                            📝 ${m.observaciones || 'Sin observaciones'}<br>
                            <small>${new Date(m.created_at).toLocaleString()}</small>`;
            lista.appendChild(li);
        }
    }

    // Login
    document.getElementById('btnLogin').onclick = async () => {
        const nick = document.getElementById('nick').value.trim();
        const password = document.getElementById('password').value;
        if (!nick || !password) {
            document.getElementById('errorMsg').innerText = "Introduce nick y contraseña";
            return;
        }
        const email = nick + DOMINIO;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            document.getElementById('errorMsg').innerText = "Error: " + error.message;
            return;
        }
        // Obtener perfil
        const { data: perfil, error: perfilError } = await supabase
            .from('perfiles')
            .select('*')
            .eq('id', data.user.id)
            .single();
        if (perfilError || !perfil) {
            await supabase.auth.signOut();
            document.getElementById('errorMsg').innerText = "Usuario no tiene perfil";
            return;
        }
        currentUser = perfil;
        currentUserId = data.user.id;
        document.getElementById('nombreTecnico').innerText = currentUser.nombre;
        document.getElementById('loginPanel').classList.add('oculto');
        document.getElementById('dashboardPanel').classList.remove('oculto');
        await cargarPiscinas();
        await cargarUltimasMediciones();
    };

    // Guardar medición
    document.getElementById('btnGuardar').onclick = async () => {
        const piscinaId = document.getElementById('piscinaSelect').value;
        const cloro = parseFloat(document.getElementById('cloro').value);
        const ph = parseFloat(document.getElementById('ph').value);
        const temperatura = parseInt(document.getElementById('temp').value);
        const observaciones = document.getElementById('obs').value.trim() || null;
        if (!piscinaId || isNaN(cloro) || isNaN(ph) || isNaN(temperatura)) {
            document.getElementById('mensaje').innerText = "Completa todos los campos";
            return;
        }
        const { error } = await supabase
            .from('mediciones')
            .insert({
                tecnico_id: currentUserId,
                piscina_id: piscinaId,
                cloro,
                ph,
                temperatura,
                observaciones
            });
        if (error) {
            document.getElementById('mensaje').innerText = "❌ Error: " + error.message;
        } else {
            document.getElementById('mensaje').innerText = "✅ Medición guardada";
            document.getElementById('cloro').value = '';
            document.getElementById('ph').value = '';
            document.getElementById('temp').value = '';
            document.getElementById('obs').value = '';
            cargarUltimasMediciones();
        }
    };

    // Logout
    document.getElementById('btnLogout').onclick = async () => {
        await supabase.auth.signOut();
        location.reload();
    };
</script>
</body>
</html>
