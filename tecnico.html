<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Técnico · Aqua Garden</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f1f5f9;
            padding: 32px 24px;
            color: #0f172a;
        }
        .container { max-width: 1280px; margin: 0 auto; }
        .oculto { display: none; }

        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05), 0 10px 15px -3px rgba(0,0,0,0.03);
            margin-bottom: 28px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .card-header {
            padding: 20px 28px 12px 28px;
            border-bottom: 1px solid #eef2ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .card-title {
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: -0.01em;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-content { padding: 20px 28px 24px 28px; }

        .fila {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 20px;
        }
        .grupo {
            flex: 1;
            min-width: 150px;
        }
        .grupo label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #475569;
            margin-bottom: 6px;
        }
        input, select, textarea, button {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 0.9rem;
            background: #fff;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        button {
            background: #2563eb;
            color: white;
            font-weight: 500;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:hover { background: #1d4ed8; transform: translateY(-1px); }
        button.secondary { background: #2c7a4d; }
        button.secondary:hover { background: #1f5e3a; }
        button.outline {
            background: white;
            color: #2563eb;
            border: 1px solid #2563eb;
        }
        button.outline:hover { background: #eff6ff; transform: none; }
        button.whatsapp { background: #25D366; }
        button.whatsapp:hover { background: #128C7E; }
        button.danger { background: #c2410c; }
        button.danger:hover { background: #9a330a; }

        .estado-jornada {
            background: #f8fafc;
            border-radius: 40px;
            padding: 14px 20px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .activa {
            background: #e0f2e9;
            color: #155724;
            border-color: #b8e0cc;
        }
        .inactiva {
            background: #fee9e6;
            color: #b13e2a;
            border-color: #fdd0c8;
        }

        .resultados-area {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .medicion-card, .jornada-card, .piscina-detalle-card {
            background: #f8fafc;
            padding: 14px 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            border-left: 4px solid #3b82f6;
        }
        .piscina-detalle-card { border-left-color: #2c7a4d; }

        .buscador-piscina {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 18px;
        }
        .buscador-piscina .grupo { flex: 2; }
        .buscador-piscina button { width: auto; padding: 10px 20px; }

        .producto-item {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 40px;
            margin-bottom: 10px;
        }
        .producto-item select, .producto-item input {
            width: auto;
            flex: 1;
            margin: 0;
            background: white;
        }
        .quitar-producto { width: auto; padding: 6px 14px; background: #c2410c; }

        .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .piscina-detalle { margin-top: 8px; padding-top: 8px; border-top: 1px solid #e2e8f0; }

        @media (max-width: 720px) {
            .card-content { padding: 16px; }
            .fila { flex-direction: column; align-items: stretch; }
            .buscador-piscina { flex-direction: column; }
            .grid-datos { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Login (visible) -->
    <div id="loginPanel" class="card">
        <div class="card-header"><div class="card-title">🔐 Acceso técnico</div></div>
        <div class="card-content">
            <div class="fila">
                <div class="grupo"><label>Usuario (nick)</label><input type="text" id="nick" placeholder="Ej: tecnico" value="tecnico"></div>
                <div class="grupo"><label>Contraseña</label><input type="password" id="password" placeholder="••••••" value="123456"></div>
                <button id="btnLogin" style="width: auto; align-self: flex-end;">Iniciar sesión</button>
            </div>
            <div id="errorMsg" style="color:#c2410c; margin-top:12px; font-size:0.85rem;"></div>
        </div>
    </div>

    <!-- Dashboard (oculto hasta login) -->
    <div id="dashboardPanel" class="oculto">
        <!-- Jornada -->
        <div class="card">
            <div class="card-header"><div class="card-title">🕒 Registro de jornada</div></div>
            <div class="card-content">
                <div id="estadoJornada" class="estado-jornada inactiva">⚠️ Jornada no iniciada</div>
                <div style="display: flex; gap: 16px;">
                    <button id="btnIniciarJornada" style="flex:1;">🟢 Iniciar jornada</button>
                    <button id="btnFinalizarJornada" class="oculto" style="flex:1;">🔴 Finalizar jornada</button>
                </div>
            </div>
        </div>

        <!-- Registrar medición (solo si jornada activa) -->
        <div id="medicionesContainer" class="card oculto">
            <div class="card-header"><div class="card-title">🧪 Nueva medición</div></div>
            <div class="card-content">
                <div class="buscador-piscina">
                    <div class="grupo"><label>Piscina</label><input type="text" id="buscarPiscina" placeholder="Buscar por nombre..."></div>
                    <button id="btnBuscarPiscina" class="outline">🔍 Buscar</button>
                </div>
                <select id="piscinaSelect"></select>
                
                <!-- Datos de la piscina seleccionada -->
                <div id="piscinaDetalle" class="piscina-detalle-card" style="margin-top: 16px; display: none;"></div>
                
                <div class="fila">
                    <div class="grupo"><label>Cloro (ppm)</label><input type="number" step="0.1" id="cloro" placeholder="0.0"></div>
                    <div class="grupo"><label>pH</label><input type="number" step="0.1" id="ph" placeholder="7.2"></div>
                    <div class="grupo"><label>Temperatura (°C)</label><input type="number" id="temp" placeholder="26"></div>
                </div>
                <div class="grupo"><label>Observaciones</label><textarea id="obs" rows="2" placeholder="Incidencias, ajustes o comentarios..."></textarea></div>
                <div style="display: flex; gap: 16px; margin: 12px 0 8px;">
                    <button id="btnReportarWhatsApp" class="whatsapp" style="flex:1;">📱 Reportar incidencia al gerente</button>
                </div>
                <div class="grupo" style="margin-top: 12px;"><label>Productos químicos usados</label></div>
                <div id="productosContainer"></div>
                <button id="agregarProducto" class="secondary" style="width: auto; margin-top: 8px;">➕ Agregar producto</button>
                <button id="btnGuardar" style="margin-top: 24px;">💾 Guardar medición</button>
                <div id="mensaje" style="margin-top: 12px; font-size:0.85rem;"></div>
            </div>
        </div>

        <!-- Histórico de jornadas -->
        <div class="card">
            <div class="card-header"><div class="card-title">📋 Histórico de jornadas</div></div>
            <div class="card-content">
                <div class="fila">
                    <div class="grupo"><label>Fecha concreta</label><input type="date" id="fechaJornada"></div>
                    <button id="btnJornadasPorFecha" class="outline">Ver jornadas</button>
                </div>
                <div class="fila">
                    <div class="grupo"><label>Desde</label><input type="date" id="fechaJornadaDesde"></div>
                    <div class="grupo"><label>Hasta</label><input type="date" id="fechaJornadaHasta"></div>
                    <button id="btnJornadasPDF" class="danger">📄 Descargar PDF (rango)</button>
                </div>
                <div id="listaJornadas" class="resultados-area"></div>
            </div>
        </div>

        <!-- Mediciones de la jornada activa (se muestra primero) -->
        <div class="card">
            <div class="card-header"><div class="card-title">📜 Mediciones de la jornada activa</div></div>
            <div class="card-content">
                <div id="listaMediciones" class="resultados-area"></div>
                <div class="fila" style="margin-top: 20px;">
                    <div class="grupo"><label>Fecha concreta</label><input type="date" id="fechaMedicion"></div>
                    <button id="btnMedicionesPorFecha" class="outline">Ver mediciones de esa fecha</button>
                </div>
                <div class="fila">
                    <div class="grupo"><label>Desde</label><input type="date" id="fechaMedicionDesde"></div>
                    <div class="grupo"><label>Hasta</label><input type="date" id="fechaMedicionHasta"></div>
                    <button id="btnMedicionesPDF" class="danger">📄 Descargar PDF (rango)</button>
                </div>
            </div>
        </div>

        <button id="btnLogout" class="outline" style="width: auto; margin-bottom: 20px;">🚪 Cerrar sesión</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://vvdyofbapqttcvczokiw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MwuazhcxSJGc04eS2vttZA_SEcGjhVT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const DOMINIO = "@mipiscina.com";
    const WA_NUMBER = "34612345678"; // Cambiar por número real del gerente

    let currentUserId = null;
    let jornadaActiva = null;
    let productosTemp = [];
    let piscinasList = [];
    let piscinasDetalle = {};

    const productosPredefinidos = [
        "Cloro granulado", "Cloro pastillas", "pH+ (aumentador)", "pH- (disminuidor)",
        "Floculante", "Alguicida", "Aclarante", "Anticalcáreo", "Oxígeno activo", "Otro"
    ];

    function exportarPDF(elemento, nombreArchivo) {
        html2pdf().set({ filename: `${nombreArchivo}.pdf`, margin: 10 }).from(elemento).save();
    }

    // Mostrar datos de la piscina seleccionada
    function mostrarDetallePiscina(piscinaId) {
        const p = piscinasDetalle[piscinaId];
        const container = document.getElementById('piscinaDetalle');
        if (!p || (!p.localidad && !p.direccion && !p.codigo_postal && !p.telefono_contacto && !p.capacidad)) {
            container.style.display = 'none';
            return;
        }
        container.innerHTML = `
            <strong>📍 Datos de la piscina</strong>
            <div class="grid-datos">
                ${p.localidad ? `<div><strong>Localidad:</strong> ${p.localidad}</div>` : ''}
                ${p.direccion ? `<div><strong>Dirección:</strong> ${p.direccion}</div>` : ''}
                ${p.codigo_postal ? `<div><strong>Código postal:</strong> ${p.codigo_postal}</div>` : ''}
                ${p.telefono_contacto ? `<div><strong>Teléfono:</strong> ${p.telefono_contacto}</div>` : ''}
                ${p.capacidad ? `<div><strong>Capacidad:</strong> ${p.capacidad} personas</div>` : ''}
            </div>
        `;
        container.style.display = 'block';
    }

    // LOGIN
    async function hacerLogin() {
        const nick = document.getElementById('nick').value.trim();
        const password = document.getElementById('password').value;
        if (!nick || !password) { 
            document.getElementById('errorMsg').innerText = "Introduce nick y contraseña"; 
            return false; 
        }
        const email = nick + DOMINIO;
        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email, password });
        if (authError) { 
            document.getElementById('errorMsg').innerText = authError.message; 
            return false; 
        }
        const { data: perfil, error: perfilError } = await sb.from('perfiles').select('*').eq('id', authData.user.id).single();
        if (perfilError || !perfil) { 
            await sb.auth.signOut(); 
            document.getElementById('errorMsg').innerText = "Usuario sin perfil"; 
            return false; 
        }
        if (perfil.rol !== 'tecnico') { 
            await sb.auth.signOut(); 
            document.getElementById('errorMsg').innerText = "Acceso solo para técnicos"; 
            return false; 
        }
        currentUserId = authData.user.id;
        return true;
    }

    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').classList.add('oculto');
            document.getElementById('dashboardPanel').classList.remove('oculto');
            await cargarPiscinas();
            await cargarJornadaActiva();
            await cargarMedicionesDeJornadaActiva();
            actualizarUIJornada();
        }
    };

    // PISCINAS Y BUSCADOR
    async function cargarPiscinas() {
        const { data } = await sb.from('piscinas').select('*').order('nombre');
        piscinasList = data || [];
        piscinasDetalle = {};
        piscinasList.forEach(p => { piscinasDetalle[p.id] = p; });
        actualizarSelectPiscinas(piscinasList);
    }

    function actualizarSelectPiscinas(lista) {
        const select = document.getElementById('piscinaSelect');
        select.innerHTML = '<option value="">Selecciona piscina</option>';
        lista.forEach(p => { 
            const opt = document.createElement('option'); 
            opt.value = p.id; 
            opt.textContent = p.nombre; 
            select.appendChild(opt); 
        });
    }

    document.getElementById('btnBuscarPiscina').onclick = () => {
        const texto = document.getElementById('buscarPiscina').value.toLowerCase();
        const filtradas = piscinasList.filter(p => p.nombre.toLowerCase().includes(texto));
        actualizarSelectPiscinas(filtradas);
        if (filtradas.length === 0) {
            const msgDiv = document.getElementById('mensaje');
            msgDiv.innerHTML = '<span style="color:#c2410c;">⚠️ No se encontraron piscinas con ese nombre</span>';
            setTimeout(() => msgDiv.innerHTML = '', 3000);
        }
    };

    // Al cambiar la selección de piscina, mostrar sus datos
    document.getElementById('piscinaSelect').onchange = () => {
        const piscinaId = document.getElementById('piscinaSelect').value;
        if (piscinaId && piscinasDetalle[piscinaId]) {
            mostrarDetallePiscina(piscinaId);
        } else {
            document.getElementById('piscinaDetalle').style.display = 'none';
        }
    };

    // JORNADA
    async function cargarJornadaActiva() {
        const { data } = await sb.from('jornadas').select('*').eq('tecnico_id', currentUserId).is('fin', null).maybeSingle();
        jornadaActiva = data || null;
        actualizarUIJornada();
    }

    function actualizarUIJornada() {
        const estadoDiv = document.getElementById('estadoJornada');
        const btnIniciar = document.getElementById('btnIniciarJornada');
        const btnFinalizar = document.getElementById('btnFinalizarJornada');
        const medicionesContainer = document.getElementById('medicionesContainer');
        if (jornadaActiva) {
            estadoDiv.innerHTML = `✅ Jornada activa desde ${new Date(jornadaActiva.inicio).toLocaleString()}`;
            estadoDiv.className = "estado-jornada activa";
            btnIniciar.classList.add('oculto');
            btnFinalizar.classList.remove('oculto');
            medicionesContainer.classList.remove('oculto');
        } else {
            estadoDiv.innerHTML = "⚠️ Jornada no iniciada";
            estadoDiv.className = "estado-jornada inactiva";
            btnIniciar.classList.remove('oculto');
            btnFinalizar.classList.add('oculto');
            medicionesContainer.classList.add('oculto');
        }
    }

    document.getElementById('btnIniciarJornada').onclick = async () => {
        if (jornadaActiva) return;
        const { data, error } = await sb.from('jornadas').insert({ tecnico_id: currentUserId, inicio: new Date().toISOString() }).select();
        if (error) { 
            document.getElementById('mensaje').innerHTML = `<span style="color:#c2410c;">❌ ${error.message}</span>`;
            return; 
        }
        jornadaActiva = data[0];
        actualizarUIJornada();
        const msgDiv = document.getElementById('mensaje');
        msgDiv.innerHTML = '<span style="color:#155724;">✅ Jornada iniciada</span>';
        setTimeout(() => msgDiv.innerHTML = '', 3000);
        await cargarMedicionesDeJornadaActiva();
    };

    document.getElementById('btnFinalizarJornada').onclick = async () => {
        if (!jornadaActiva) return;
        const { error } = await sb.from('jornadas').update({ fin: new Date().toISOString() }).eq('id', jornadaActiva.id);
        if (error) { 
            document.getElementById('mensaje').innerHTML = `<span style="color:#c2410c;">❌ ${error.message}</span>`;
            return; 
        }
        jornadaActiva = null;
        actualizarUIJornada();
        const msgDiv = document.getElementById('mensaje');
        msgDiv.innerHTML = '<span style="color:#155724;">✅ Jornada finalizada</span>';
        setTimeout(() => msgDiv.innerHTML = '', 3000);
        document.getElementById('listaMediciones').innerHTML = '<div class="medicion-card">No hay jornada activa. Inicia una jornada para ver sus mediciones.</div>';
    };

    // MEDICIONES DE JORNADA ACTIVA (se cargan automáticamente)
    async function cargarMedicionesDeJornadaActiva() {
        if (!jornadaActiva) {
            document.getElementById('listaMediciones').innerHTML = '<div class="medicion-card">No hay jornada activa. Inicia una jornada para ver sus mediciones.</div>';
            return;
        }
        const { data, error } = await sb
            .from('mediciones')
            .select('*, piscina_id')
            .eq('tecnico_id', currentUserId)
            .eq('jornada_id', jornadaActiva.id)
            .order('created_at', { ascending: false });
        if (error) { console.error(error); return; }
        mostrarMedicionesConPiscinas(data);
    }

    async function mostrarMedicionesConPiscinas(mediciones) {
        const contenedor = document.getElementById('listaMediciones');
        contenedor.innerHTML = '';
        if (!mediciones || mediciones.length === 0) {
            contenedor.innerHTML = '<div class="medicion-card">No hay mediciones en la jornada activa.</div>';
            return;
        }
        const piscinasIds = [...new Set(mediciones.map(m => m.piscina_id))];
        const { data: piscinas } = await sb.from('piscinas').select('id, nombre').in('id', piscinasIds);
        const piscinasMap = {};
        if (piscinas) piscinas.forEach(p => piscinasMap[p.id] = p.nombre);
        for (const m of mediciones) {
            const div = document.createElement('div');
            div.className = 'medicion-card';
            div.innerHTML = `<strong>🏊 ${piscinasMap[m.piscina_id] || 'Piscina'}</strong><br>
                            🧪 Cloro: ${m.cloro} ppm | ⚗️ pH: ${m.ph} | 🌡️ ${m.temperatura}°C<br>
                            📝 ${m.observaciones || 'Sin observaciones'}<br>
                            <small>${new Date(m.created_at).toLocaleString()}</small>`;
            contenedor.appendChild(div);
        }
    }

    // HISTÓRICO JORNADAS (por fecha)
    async function cargarJornadasPorFecha() {
        const fecha = document.getElementById('fechaJornada').value;
        if (!fecha) { alert("Selecciona una fecha"); return; }
        const start = new Date(`${fecha}T00:00:00`).toISOString();
        const end = new Date(`${fecha}T23:59:59`).toISOString();
        const { data, error } = await sb
            .from('jornadas')
            .select('*')
            .eq('tecnico_id', currentUserId)
            .gte('inicio', start)
            .lte('inicio', end)
            .order('inicio', { ascending: false });
        if (error) { console.error(error); return; }
        mostrarJornadas(data);
    }

    function mostrarJornadas(jornadas) {
        const contenedor = document.getElementById('listaJornadas');
        contenedor.innerHTML = '';
        if (!jornadas || jornadas.length === 0) {
            contenedor.innerHTML = '<div class="jornada-card">No hay jornadas en esta fecha</div>';
            return;
        }
        for (const j of jornadas) {
            const inicio = new Date(j.inicio);
            const fin = j.fin ? new Date(j.fin) : null;
            let duracion = '';
            if (fin) {
                const diff = fin - inicio;
                const horas = Math.floor(diff / 3600000);
                const minutos = Math.floor((diff % 3600000) / 60000);
                duracion = ` (${horas}h ${minutos}m)`;
            } else { duracion = ' (en curso)'; }
            const div = document.createElement('div');
            div.className = 'jornada-card';
            div.innerHTML = `<strong>📅 ${inicio.toLocaleDateString()}</strong><br>
                            🕒 Inicio: ${inicio.toLocaleTimeString()} → Fin: ${fin ? fin.toLocaleTimeString() : '—'}${duracion}`;
            contenedor.appendChild(div);
        }
    }

    async function descargarJornadasPDF() {
        const desde = document.getElementById('fechaJornadaDesde').value;
        const hasta = document.getElementById('fechaJornadaHasta').value;
        if (!desde || !hasta) { alert("Selecciona rango de fechas (desde-hasta)"); return; }
        const start = new Date(`${desde}T00:00:00`).toISOString();
        const end = new Date(`${hasta}T23:59:59`).toISOString();
        const { data, error } = await sb
            .from('jornadas')
            .select('*')
            .eq('tecnico_id', currentUserId)
            .gte('inicio', start)
            .lte('inicio', end)
            .order('inicio', { ascending: false });
        if (error) { alert("Error al obtener datos"); return; }
        if (!data || data.length === 0) { alert("No hay jornadas en el rango seleccionado"); return; }
        const tempDiv = document.createElement('div');
        tempDiv.style.padding = '20px';
        tempDiv.style.fontFamily = 'system-ui';
        tempDiv.innerHTML = `<h2>Histórico de jornadas (${desde} a ${hasta})</h2>`;
        for (const j of data) {
            const inicio = new Date(j.inicio);
            const fin = j.fin ? new Date(j.fin) : null;
            let duracion = '';
            if (fin) {
                const diff = fin - inicio;
                const horas = Math.floor(diff / 3600000);
                const minutos = Math.floor((diff % 3600000) / 60000);
                duracion = ` (${horas}h ${minutos}m)`;
            } else { duracion = ' (en curso)'; }
            tempDiv.innerHTML += `<div style="border-left:4px solid #3b82f6; margin-bottom:12px; padding:8px;">
                                    <strong>📅 ${inicio.toLocaleDateString()}</strong><br>
                                    🕒 Inicio: ${inicio.toLocaleTimeString()} → Fin: ${fin ? fin.toLocaleTimeString() : '—'}${duracion}
                                   </div>`;
        }
        exportarPDF(tempDiv, `jornadas_${desde}_a_${hasta}`);
    }

    // MEDICIONES POR FECHA (dentro de la jornada activa)
    async function cargarMedicionesPorFecha() {
        if (!jornadaActiva) {
            alert("No hay jornada activa. Inicia una jornada primero.");
            return;
        }
        const fecha = document.getElementById('fechaMedicion').value;
        if (!fecha) { alert("Selecciona una fecha"); return; }
        const start = new Date(`${fecha}T00:00:00`).toISOString();
        const end = new Date(`${fecha}T23:59:59`).toISOString();
        const { data, error } = await sb
            .from('mediciones')
            .select('*, piscina_id')
            .eq('tecnico_id', currentUserId)
            .eq('jornada_id', jornadaActiva.id)
            .gte('created_at', start)
            .lte('created_at', end)
            .order('created_at', { ascending: false });
        if (error) { console.error(error); return; }
        mostrarMedicionesConPiscinas(data);
    }

    async function descargarMedicionesPDF() {
        if (!jornadaActiva) {
            alert("No hay jornada activa. Inicia una jornada primero.");
            return;
        }
        const desde = document.getElementById('fechaMedicionDesde').value;
        const hasta = document.getElementById('fechaMedicionHasta').value;
        if (!desde || !hasta) { alert("Selecciona rango de fechas (desde-hasta)"); return; }
        const start = new Date(`${desde}T00:00:00`).toISOString();
        const end = new Date(`${hasta}T23:59:59`).toISOString();
        const { data, error } = await sb
            .from('mediciones')
            .select('*, piscina_id')
            .eq('tecnico_id', currentUserId)
            .eq('jornada_id', jornadaActiva.id)
            .gte('created_at', start)
            .lte('created_at', end)
            .order('created_at', { ascending: false });
        if (error) { alert("Error al obtener datos"); return; }
        if (!data || data.length === 0) { alert("No hay mediciones en el rango seleccionado"); return; }
        const piscinasIds = [...new Set(data.map(m => m.piscina_id))];
        const { data: piscinas } = await sb.from('piscinas').select('id, nombre').in('id', piscinasIds);
        const piscinasMap = {};
        if (piscinas) piscinas.forEach(p => piscinasMap[p.id] = p.nombre);
        const tempDiv = document.createElement('div');
        tempDiv.style.padding = '20px';
        tempDiv.style.fontFamily = 'system-ui';
        tempDiv.innerHTML = `<h2>Histórico de mediciones (${desde} a ${hasta})</h2>`;
        for (const m of data) {
            tempDiv.innerHTML += `<div style="border-left:4px solid #3b82f6; margin-bottom:12px; padding:8px;">
                                    <strong>🏊 ${piscinasMap[m.piscina_id] || 'Piscina'}</strong><br>
                                    🧪 Cloro: ${m.cloro} ppm | ⚗️ pH: ${m.ph} | 🌡️ ${m.temperatura}°C<br>
                                    📝 ${m.observaciones || 'Sin observaciones'}<br>
                                    <small>${new Date(m.created_at).toLocaleString()}</small>
                                   </div>`;
        }
        exportarPDF(tempDiv, `mediciones_${desde}_a_${hasta}`);
    }

    // PRODUCTOS QUÍMICOS con desplegable y valor por defecto
    function renderizarProductos() {
        const contenedor = document.getElementById('productosContainer');
        contenedor.innerHTML = '';
        productosTemp.forEach((prod, idx) => {
            const div = document.createElement('div');
            div.className = 'producto-item';
            div.innerHTML = `
                <select class="prod-nombre" data-idx="${idx}">
                    ${productosPredefinidos.map(p => `<option value="${p}" ${prod.nombre === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
                <input type="number" step="0.01" class="prod-cantidad" placeholder="Cantidad" value="${prod.cantidad}">
                <select class="prod-unidad">
                    <option value="gramos" ${prod.unidad === 'gramos' ? 'selected' : ''}>gramos</option>
                    <option value="pastillas" ${prod.unidad === 'pastillas' ? 'selected' : ''}>pastillas</option>
                    <option value="litros" ${prod.unidad === 'litros' ? 'selected' : ''}>litros</option>
                    <option value="mililitros" ${prod.unidad === 'mililitros' ? 'selected' : ''}>mililitros</option>
                </select>
                <button class="quitar-producto" data-idx="${idx}">✖</button>
            `;
            contenedor.appendChild(div);
        });
        document.querySelectorAll('.prod-nombre').forEach(sel => {
            sel.addEventListener('change', (e) => {
                const idx = parseInt(e.target.getAttribute('data-idx'));
                productosTemp[idx].nombre = e.target.value;
            });
        });
        document.querySelectorAll('.prod-cantidad').forEach((inp, i) => {
            inp.addEventListener('input', (e) => productosTemp[i].cantidad = parseFloat(e.target.value) || 0);
        });
        document.querySelectorAll('.prod-unidad').forEach((sel, i) => {
            sel.addEventListener('change', (e) => productosTemp[i].unidad = e.target.value);
        });
        document.querySelectorAll('.quitar-producto').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.getAttribute('data-idx'));
                productosTemp.splice(idx, 1);
                renderizarProductos();
            });
        });
    }

    document.getElementById('agregarProducto').onclick = () => {
        productosTemp.push({ nombre: productosPredefinidos[0], cantidad: 0, unidad: "gramos" });
        renderizarProductos();
    };

    // GUARDAR MEDICIÓN
    document.getElementById('btnGuardar').onclick = async () => {
        if (!jornadaActiva) {
            document.getElementById('mensaje').innerHTML = '<span style="color:#c2410c;">⚠️ Inicia jornada primero</span>';
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
            return;
        }
        const piscinaId = document.getElementById('piscinaSelect').value;
        const cloro = parseFloat(document.getElementById('cloro').value);
        const ph = parseFloat(document.getElementById('ph').value);
        const temperatura = parseInt(document.getElementById('temp').value);
        const observaciones = document.getElementById('obs').value;
        if (!piscinaId || isNaN(cloro) || isNaN(ph) || isNaN(temperatura)) {
            document.getElementById('mensaje').innerHTML = '<span style="color:#c2410c;">⚠️ Completa todos los campos</span>';
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
            return;
        }
        const { data: medicion, error: errMed } = await sb.from('mediciones').insert({
            tecnico_id: currentUserId,
            piscina_id: piscinaId,
            jornada_id: jornadaActiva.id,
            cloro, ph, temperatura, observaciones
        }).select();
        if (errMed) {
            document.getElementById('mensaje').innerHTML = `<span style="color:#c2410c;">❌ ${errMed.message}</span>`;
            return;
        }
        const medicionId = medicion[0].id;
        for (const prod of productosTemp) {
            if (prod.cantidad > 0) {
                await sb.from('productos_utilizados').insert({
                    medicion_id: medicionId,
                    producto_nombre: prod.nombre,
                    cantidad: prod.cantidad,
                    unidad: prod.unidad
                });
            }
        }
        document.getElementById('mensaje').innerHTML = '<span style="color:#155724;">✅ Medición guardada</span>';
        document.getElementById('cloro').value = '';
        document.getElementById('ph').value = '';
        document.getElementById('temp').value = '';
        document.getElementById('obs').value = '';
        productosTemp = [];
        renderizarProductos();
        setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
        await cargarMedicionesDeJornadaActiva();
    };

    // WHATSAPP
    async function enviarWhatsApp() {
        if (!jornadaActiva) {
            document.getElementById('mensaje').innerHTML = '<span style="color:#c2410c;">⚠️ Debes iniciar una jornada para reportar incidencias</span>';
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 4000);
            return;
        }
        const observaciones = document.getElementById('obs').value.trim();
        if (!observaciones) {
            document.getElementById('mensaje').innerHTML = '<span style="color:#c2410c;">⚠️ Escribe una observación antes de reportar</span>';
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 4000);
            return;
        }
        const piscinaSelect = document.getElementById('piscinaSelect');
        const piscinaNombre = piscinaSelect.options[piscinaSelect.selectedIndex]?.text || "No seleccionada";
        const cloro = document.getElementById('cloro').value || "—";
        const ph = document.getElementById('ph').value || "—";
        const temperatura = document.getElementById('temp').value || "—";
        const { data: tecnico } = await sb.from('perfiles').select('nick, nombre').eq('id', currentUserId).single();
        const tecnicoNombre = tecnico?.nombre || tecnico?.nick || "Técnico";
        const fechaHora = new Date().toLocaleString();
        const mensaje = `⚠️ *INCIDENCIA EN PISCINA*\n\n` +
                        `👤 *Técnico:* ${tecnicoNombre}\n` +
                        `🏊 *Piscina:* ${piscinaNombre}\n` +
                        `📊 *Medición:* Cloro ${cloro} ppm | pH ${ph} | ${temperatura}°C\n` +
                        `📝 *Observación:* ${observaciones}\n` +
                        `🕒 *Fecha/Hora:* ${fechaHora}\n` +
                        `🔹 *Jornada activa desde:* ${new Date(jornadaActiva.inicio).toLocaleString()}`;
        const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
        document.getElementById('mensaje').innerHTML = '<span style="color:#155724;">📱 Incidencia enviada (se abrirá WhatsApp)</span>';
        setTimeout(() => document.getElementById('mensaje').innerHTML = '', 4000);
    }

    // EVENTOS PRINCIPALES
    document.getElementById('btnJornadasPorFecha').onclick = cargarJornadasPorFecha;
    document.getElementById('btnJornadasPDF').onclick = descargarJornadasPDF;
    document.getElementById('btnMedicionesPorFecha').onclick = cargarMedicionesPorFecha;
    document.getElementById('btnMedicionesPDF').onclick = descargarMedicionesPDF;
    document.getElementById('btnReportarWhatsApp').onclick = enviarWhatsApp;
    document.getElementById('btnLogout').onclick = async () => { await sb.auth.signOut(); location.reload(); };
</script>
</body>
</html>
