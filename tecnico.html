<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Panel Técnico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Tus estilos (puedes mantener los que ya usabas) */
        body { font-family: system-ui; max-width: 800px; margin: auto; padding: 20px; background: #eef2ff; }
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; }
        input, button, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0066cc; color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-jornada { background: #2c7a4d; }
        .btn-fin { background: #c2410c; }
        .oculto { display: none; }
        .estado-jornada { background: #f0f0f0; padding: 12px; border-radius: 24px; margin: 16px 0; text-align: center; }
        .activa { background: #d4edda; color: #155724; }
        .inactiva { background: #f8d7da; color: #721c24; }
        .buscar-container { display: flex; gap: 8px; align-items: center; }
        .buscar-container input { flex: 1; margin: 0; }
        .buscar-container button { width: auto; padding: 12px 16px; }
        .producto-item { display: flex; gap: 8px; flex-wrap: wrap; background: #f9f9f9; padding: 12px; border-radius: 24px; margin-bottom: 12px; }
        .producto-item select, .producto-item input { width: auto; flex: 1; margin: 0; }
        .agregar-producto { background: #2c7a4d; }
        .fecha-buscar { display: flex; gap: 8px; margin: 16px 0; }
        .fecha-buscar input { flex: 1; margin: 0; }
        .fecha-buscar button { width: auto; }
        .lista-mediciones li { background: #f9f9f9; margin: 8px 0; padding: 10px; border-radius: 16px; }
    </style>
</head>
<body>

<div id="loginPanel" class="card">
    <h2>🔐 Acceso Técnico</h2>
    <input type="text" id="nick" placeholder="Tu nick (ej: mikel)" value="mikel">
    <input type="password" id="password" placeholder="Contraseña" value="123456">
    <button id="btnLogin">Iniciar sesión</button>
    <div id="loginMensaje"></div>
</div>

<div id="dashboardPanel" class="card oculto">
    <h2>📋 Panel de Control</h2>
    <p>Bienvenido, <span id="nombreTecnico"></span> (<span id="nickUsuario"></span>)</p>
    <hr>

    <div id="jornadaContainer">
        <div id="estadoJornada" class="estado-jornada inactiva">⚠️ Jornada no iniciada</div>
        <button id="btnIniciarJornada" class="btn-jornada">🟢 Iniciar jornada</button>
        <button id="btnFinalizarJornada" class="btn-fin oculto">🔴 Finalizar jornada</button>
    </div>

    <div id="medicionesContainer" class="oculto">
        <h3>📝 Registrar medición</h3>
        <label>🏊 Piscina</label>
        <div class="buscar-container">
            <input type="text" id="buscarPiscina" placeholder="Escribe el nombre...">
            <button id="btnBuscarPiscina" class="btn-buscar">🔍 Buscar</button>
        </div>
        <select id="piscinaId"></select>

        <input type="number" step="0.1" id="nuevoCloro" placeholder="Cloro (ppm)">
        <input type="number" step="0.1" id="nuevoPh" placeholder="pH">
        <input type="number" id="nuevaTemp" placeholder="Temperatura (°C)">
        <textarea id="nuevasObservaciones" rows="2" placeholder="Observaciones"></textarea>

        <label style="font-weight: bold; margin-top: 16px;">🧴 Productos químicos usados</label>
        <div id="productosContainer">
            <div id="listaProductos"></div>
            <button type="button" id="agregarProducto" class="agregar-producto">➕ Añadir producto</button>
        </div>
        <button id="btnRegistrar">💾 Enviar medición</button>
        <div id="mensajeExito"></div>
    </div>

    <hr>
    <h3>📅 Consultar mediciones por fecha</h3>
    <div class="fecha-buscar">
        <input type="date" id="fechaConsulta">
        <button id="btnBuscarFecha">Ver mediciones del día</button>
    </div>
    <ul id="listaPorFecha" style="list-style: none; padding: 0;"></ul>

    <hr>
    <h3>📜 Últimas 5 mediciones</h3>
    <ul id="listaUltimasMediciones" style="list-style: none; padding: 0;"></ul>

    <button id="btnLogout" style="background: #c2410c; margin-top: 20px;">🚪 Cerrar sesión</button>
</div>

<script>
    const SUPABASE_URL = "https://zlaatodfoulhhhvoyrrr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Ow6HYUU0x0Yzhb6UqqR2iQ_xEoTpcAL";
    const DOMINIO = "@mipiscina.com"; // mismo dominio que usas al crear técnicos

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let jornadaActiva = null;
    let piscinasList = [];
    let productosTemp = [];
    const productosDisponibles = ["Cloro granulado","Cloro pastillas","pH+ (aumentador)","pH- (disminuidor)","Floculante","Alguicida","Aclarante","Anticalcáreo","Oxígeno activo","Otro"];

    function formatLocalDate(isoString) {
        if (!isoString) return '';
        return new Intl.DateTimeFormat('es-ES', { timeZone: 'Europe/Madrid', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' }).format(new Date(isoString));
    }

    // --- PISCINAS ---
    async function cargarPiscinas() {
        const { data, error } = await supabase.from('piscinas').select('*').order('nombre');
        if (error) return console.error(error);
        piscinasList = data;
        const select = document.getElementById('piscinaId');
        select.innerHTML = '<option value="">Selecciona una piscina</option>';
        piscinasList.forEach(p => {
            const option = document.createElement('option');
            option.value = p.id;
            option.textContent = `${p.nombre} (${p.ubicacion || 'sin ubicación'})`;
            select.appendChild(option);
        });
    }

    document.getElementById('btnBuscarPiscina').onclick = () => {
        const texto = document.getElementById('buscarPiscina').value.toLowerCase();
        const select = document.getElementById('piscinaId');
        for (let i=0; i<select.options.length; i++) {
            if (select.options[i].text.toLowerCase().includes(texto)) {
                select.selectedIndex = i;
                break;
            }
        }
    };

    // --- JORNADA ---
    async function cargarJornadaActiva() {
        const { data, error } = await supabase
            .from('jornadas')
            .select('*')
            .eq('tecnico_id', currentUser.id)
            .is('fin', null)
            .maybeSingle();
        if (error) console.error(error);
        jornadaActiva = data || null;
        actualizarUIJornada();
    }

    function actualizarUIJornada() {
        const estadoDiv = document.getElementById('estadoJornada');
        const btnIniciar = document.getElementById('btnIniciarJornada');
        const btnFinalizar = document.getElementById('btnFinalizarJornada');
        const medicionesContainer = document.getElementById('medicionesContainer');
        if (jornadaActiva) {
            estadoDiv.innerHTML = `✅ Jornada activa desde ${formatLocalDate(jornadaActiva.inicio)}`;
            estadoDiv.className = "estado-jornada activa";
            btnIniciar.classList.add('oculto');
            btnFinalizar.classList.remove('oculto');
            medicionesContainer.classList.remove('oculto');
        } else {
            estadoDiv.innerHTML = "⚠️ Jornada no iniciada";
            estadoDiv.className = "estado-jornada inactiva";
            btnIniciar.classList.remove('oculto');
            btnFinalizar.classList.add('oculto');
            medicionesContainer.classList.add('oculto');
        }
    }

    document.getElementById('btnIniciarJornada').onclick = async () => {
        if (jornadaActiva) return;
        const { data, error } = await supabase
            .from('jornadas')
            .insert({ tecnico_id: currentUser.id, inicio: new Date().toISOString() })
            .select();
        if (error) { document.getElementById('mensajeExito').innerText = "❌ Error: " + error.message; return; }
        jornadaActiva = data[0];
        actualizarUIJornada();
        document.getElementById('mensajeExito').innerText = "✅ Jornada iniciada";
    };

    document.getElementById('btnFinalizarJornada').onclick = async () => {
        if (!jornadaActiva) return;
        const { error } = await supabase
            .from('jornadas')
            .update({ fin: new Date().toISOString() })
            .eq('id', jornadaActiva.id);
        if (error) { document.getElementById('mensajeExito').innerText = "❌ Error: " + error.message; return; }
        jornadaActiva = null;
        actualizarUIJornada();
        document.getElementById('mensajeExito').innerText = "✅ Jornada finalizada";
    };

    // --- PRODUCTOS TEMPORALES ---
    function renderizarProductos() {
        const contenedor = document.getElementById('listaProductos');
        contenedor.innerHTML = '';
        productosTemp.forEach((prod, idx) => {
            const div = document.createElement('div');
            div.className = 'producto-item';
            div.innerHTML = `
                <select data-idx="${idx}" class="prod-nombre">${productosDisponibles.map(p => `<option value="${p}" ${prod.nombre===p?'selected':''}>${p}</option>`).join('')}</select>
                <input type="number" step="0.01" data-idx="${idx}" class="prod-cantidad" placeholder="Cantidad" value="${prod.cantidad || ''}">
                <select data-idx="${idx}" class="prod-unidad">
                    <option value="gramos" ${prod.unidad==='gramos'?'selected':''}>gramos</option>
                    <option value="pastillas" ${prod.unidad==='pastillas'?'selected':''}>pastillas</option>
                    <option value="litros" ${prod.unidad==='litros'?'selected':''}>litros</option>
                    <option value="mililitros" ${prod.unidad==='mililitros'?'selected':''}>mililitros</option>
                </select>
                <button class="quitar-producto" data-idx="${idx}">✖</button>
            `;
            contenedor.appendChild(div);
        });
        // eventos
        document.querySelectorAll('.prod-nombre').forEach(sel => sel.addEventListener('change', (e) => productosTemp[e.target.dataset.idx].nombre = e.target.value));
        document.querySelectorAll('.prod-cantidad').forEach(inp => inp.addEventListener('input', (e) => productosTemp[e.target.dataset.idx].cantidad = parseFloat(e.target.value) || 0));
        document.querySelectorAll('.prod-unidad').forEach(sel => sel.addEventListener('change', (e) => productosTemp[e.target.dataset.idx].unidad = e.target.value));
        document.querySelectorAll('.quitar-producto').forEach(btn => btn.addEventListener('click', (e) => { productosTemp.splice(parseInt(e.target.dataset.idx),1); renderizarProductos(); }));
    }

    document.getElementById('agregarProducto').onclick = () => {
        productosTemp.push({ nombre: "Cloro granulado", cantidad: 0, unidad: "gramos" });
        renderizarProductos();
    };

    // --- REGISTRAR MEDICIÓN ---
    document.getElementById('btnRegistrar').onclick = async () => {
        if (!jornadaActiva) { document.getElementById('mensajeExito').innerText = "⚠️ Inicia jornada primero"; return; }
        const piscinaId = document.getElementById('piscinaId').value;
        if (!piscinaId) { document.getElementById('mensajeExito').innerText = "⚠️ Selecciona piscina"; return; }
        const cloro = parseFloat(document.getElementById('nuevoCloro').value);
        const ph = parseFloat(document.getElementById('nuevoPh').value);
        const temperatura = parseInt(document.getElementById('nuevaTemp').value);
        if (isNaN(cloro) || isNaN(ph) || isNaN(temperatura)) { document.getElementById('mensajeExito').innerText = "⚠️ Rellena cloro, pH y temperatura"; return; }
        const observaciones = document.getElementById('nuevasObservaciones').value.trim() || null;

        const { data: medicion, error: errMed } = await supabase
            .from('mediciones')
            .insert({ tecnico_id: currentUser.id, piscina_id: piscinaId, jornada_id: jornadaActiva.id, cloro, ph, temperatura, observaciones })
            .select();
        if (errMed) { document.getElementById('mensajeExito').innerText = "❌ Error: " + errMed.message; return; }
        const medicionId = medicion[0].id;
        for (const prod of productosTemp) {
            if (prod.cantidad && prod.cantidad > 0) {
                await supabase.from('productos_utilizados').insert({ medicion_id: medicionId, producto_nombre: prod.nombre, cantidad: prod.cantidad, unidad: prod.unidad });
            }
        }
        document.getElementById('mensajeExito').innerText = "✅ Medición guardada";
        document.getElementById('nuevoCloro').value = '';
        document.getElementById('nuevoPh').value = '';
        document.getElementById('nuevaTemp').value = '';
        document.getElementById('nuevasObservaciones').value = '';
        productosTemp = [];
        renderizarProductos();
        cargarUltimasMediciones();
    };

    // --- ÚLTIMAS 5 MEDICIONES ---
    async function cargarUltimasMediciones() {
        const { data, error } = await supabase
            .from('mediciones')
            .select('*, piscinas(nombre)')
            .eq('tecnico_id', currentUser.id)
            .order('created_at', { ascending: false })
            .limit(5);
        if (error) return console.error(error);
        const lista = document.getElementById('listaUltimasMediciones');
        lista.innerHTML = '';
        if (!data || data.length === 0) { lista.innerHTML = '<li>No hay mediciones</li>'; return; }
        for (const m of data) {
            const { data: productos } = await supabase.from('productos_utilizados').select('*').eq('medicion_id', m.id);
            let productosHtml = '';
            if (productos && productos.length) productosHtml = `<br><small>🧴 Productos: ${productos.map(p => `${p.cantidad} ${p.unidad} de ${p.producto_nombre}`).join(', ')}</small>`;
            const li = document.createElement('li');
            li.className = 'lista-mediciones';
            li.innerHTML = `<strong>🏊 ${m.piscinas.nombre}</strong><br>🧪 Cloro ${m.cloro} | ⚗️ pH ${m.ph} | 🌡️ ${m.temperatura}°C<br>📝 ${m.observaciones || 'Sin observaciones'}<br><small>${formatLocalDate(m.created_at)}</small>${productosHtml}`;
            lista.appendChild(li);
        }
    }

    // --- CONSULTAR POR FECHA ---
    document.getElementById('btnBuscarFecha').onclick = async () => {
        const fecha = document.getElementById('fechaConsulta').value;
        if (!fecha) { alert("Selecciona una fecha"); return; }
        const startLocal = new Date(`${fecha}T00:00:00`);
        const endLocal = new Date(`${fecha}T23:59:59`);
        const startUTC = new Date(startLocal.getTime() - startLocal.getTimezoneOffset()*60000).toISOString();
        const endUTC = new Date(endLocal.getTime() - endLocal.getTimezoneOffset()*60000).toISOString();
        const { data, error } = await supabase
            .from('mediciones')
            .select('*, piscinas(nombre)')
            .eq('tecnico_id', currentUser.id)
            .gte('created_at', startUTC)
            .lte('created_at', endUTC)
            .order('created_at', { ascending: false });
        if (error) return console.error(error);
        const lista = document.getElementById('listaPorFecha');
        lista.innerHTML = '';
        if (!data || data.length === 0) { lista.innerHTML = '<li>No hay mediciones en esta fecha</li>'; return; }
        for (const m of data) {
            const { data: productos } = await supabase.from('productos_utilizados').select('*').eq('medicion_id', m.id);
            let productosHtml = '';
            if (productos && productos.length) productosHtml = `<br><small>🧴 Productos: ${productos.map(p => `${p.cantidad} ${p.unidad} de ${p.producto_nombre}`).join(', ')}</small>`;
            const li = document.createElement('li');
            li.className = 'lista-mediciones';
            li.innerHTML = `<strong>🏊 ${m.piscinas.nombre}</strong><br>🧪 Cloro ${m.cloro} | ⚗️ pH ${m.ph} | 🌡️ ${m.temperatura}°C<br>📝 ${m.observaciones || 'Sin observaciones'}<br><small>${formatLocalDate(m.created_at)}</small>${productosHtml}`;
            lista.appendChild(li);
        }
    };

    // --- LOGIN con nick ---
    document.getElementById('btnLogin').onclick = async () => {
        const nick = document.getElementById('nick').value.trim();
        const password = document.getElementById('password').value;
        if (!nick || !password) { document.getElementById('loginMensaje').innerText = "Introduce nick y contraseña"; return; }
        const email = nick + DOMINIO;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { document.getElementById('loginMensaje').innerText = "❌ Error: " + error.message; return; }
        currentUser = data.user;
        document.getElementById('loginPanel').classList.add('oculto');
        document.getElementById('dashboardPanel').classList.remove('oculto');
        const nickMostrado = currentUser.email.replace(DOMINIO, '');
        document.getElementById('nickUsuario').innerText = nickMostrado;
        // Obtener nombre real desde perfiles
        const { data: perfil } = await supabase.from('perfiles').select('nombre').eq('id', currentUser.id).single();
        document.getElementById('nombreTecnico').innerText = perfil ? perfil.nombre : nickMostrado;
        await cargarPiscinas();
        await cargarJornadaActiva();
        await cargarUltimasMediciones();
    };

    document.getElementById('btnLogout').onclick = async () => {
        await supabase.auth.signOut();
        location.reload();
    };
</script>
</body>
</html>
