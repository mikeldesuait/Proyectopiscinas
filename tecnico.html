<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Técnico · Aqua Garden · Panel de Trabajo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #eef2ff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,119,182,0.1);
        }
        .card-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 4px solid #0077b6;
            padding-left: 16px;
            color: #1e4663;
        }
        button, input, select, textarea {
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #cad2db;
            font-size: 0.85rem;
            background: #fff;
            width: 100%;
            margin: 4px 0;
        }
        button {
            background: #0066cc;
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #0052a3; transform: translateY(-1px); }
        .btn-success { background: #2c7a4d; }
        .btn-warning { background: #e67e22; }
        .btn-danger { background: #c2410c; }
        .btn-info { background: #0284c7; }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; width: auto; margin: 0; }
        .oculto { display: none; }
        
        .tecnico-header {
            background: linear-gradient(135deg, #1e4663 0%, #0077b6 100%);
            color: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .row-flex { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .grupo { flex: 1; min-width: 130px; }
        
        .tarea-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
            border-left: 4px solid;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tarea-card:hover { transform: translateX(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tarea-grave { border-left-color: #dc2626; background: #fef2f2; }
        .tarea-urgente { border-left-color: #f39c12; background: #fffbeb; }
        .tarea-normal { border-left-color: #2c7a4d; background: #f0fdf4; }
        .tarea-baja { border-left-color: #94a3b8; background: #f1f5f9; }
        
        .badge-prioridad {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-grave { background: #dc2626; color: white; }
        .badge-urgente { background: #f39c12; color: white; }
        .badge-normal { background: #2c7a4d; color: white; }
        .badge-baja { background: #94a3b8; color: white; }
        
        .consola-trabajo {
            background: #f0f9ff;
            border-radius: 20px;
            padding: 20px;
            margin-top: 16px;
        }
        .paso-actual {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 16px;
            padding: 10px 14px;
            background: #e0f2fe;
            border-radius: 40px;
        }
        .botones-consola { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .botones-consola button { flex: 1; min-width: 140px; }
        
        .equipo-info {
            background: #e0f2fe;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        #dashboardPanel { display: none; }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <!-- Login -->
    <div id="loginPanel" class="card">
        <div class="card-header" style="cursor:default;">🔧 Acceso Técnico · Aqua Garden</div>
        <input type="text" id="nick" placeholder="Nombre del técnico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="btnLogin">Iniciar sesión</button>
        <div id="errorMsg" style="color:red; margin-top:12px;"></div>
    </div>

    <div id="dashboardPanel">
        <!-- Header -->
        <div class="tecnico-header">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <div>
                    <div style="font-size: 0.8rem; opacity: 0.8;">👨‍🔧 Técnico</div>
                    <div style="font-size: 1.5rem; font-weight: 700;" id="nombreTecnico">Cargando...</div>
                    <div style="font-size: 0.8rem; opacity: 0.8;" id="emailTecnico"></div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 2rem;">🏊</div>
                    <div style="font-size: 0.7rem; opacity: 0.8;">Aqua Garden</div>
                </div>
            </div>
        </div>

        <!-- Jornada laboral -->
        <div class="card">
            <div class="card-header" style="cursor:default;">🕒 Jornada laboral</div>
            <div id="estadoJornada" style="background:#f0f4f9; padding:12px 18px; border-radius:60px; text-align:center; margin-bottom:16px;">⚠️ Jornada no iniciada</div>
            <div style="display: flex; gap: 16px;">
                <button id="btnIniciarJornada" style="flex:1;">🟢 Iniciar jornada</button>
                <button id="btnFinalizarJornada" class="oculto" style="flex:1;">🔴 Finalizar jornada</button>
            </div>
        </div>

        <!-- Pizarra de trabajo -->
        <div class="card">
            <div class="card-header">
                📋 Pizarra de trabajo · <span id="fechaPizarra"></span>
                <button id="btnRefrescarPizarra" class="btn-sm" style="background:#475569;">🔄 Refrescar</button>
            </div>
            
            <!-- Información del equipo (si está en uno) -->
            <div id="equipoInfo" class="equipo-info oculto">
                <strong>👥 Trabajando en equipo: <span id="equipoNombre"></span></strong>
                <div id="miembrosEquipo" style="font-size: 0.8rem; margin-top: 5px;"></div>
            </div>
            
            <!-- Tareas pendientes -->
            <div id="listaTareas" style="margin-top: 16px;">
                <div style="font-weight: 600; margin-bottom: 12px;">⏳ Tareas pendientes</div>
                <div id="tareasPendientesList"></div>
            </div>
            
            <!-- Tarea en curso -->
            <div id="tareaEnCursoSection" class="oculto" style="margin-top: 16px;">
                <div style="font-weight: 600; margin-bottom: 12px; color: #2c7a4d;">🏊 Tarea en curso</div>
                <div id="tareaEnCursoCard" class="tarea-card"></div>
                <button id="btnCancelarTarea" class="btn-sm btn-danger" style="margin-top: 8px;">✖ Cancelar tarea</button>
            </div>
        </div>

        <!-- Consola de trabajo -->
        <div id="consolaTrabajo" class="card oculto">
            <div class="card-header" style="cursor:default;">🎮 Consola de trabajo</div>
            
            <div id="estadoActual" class="paso-actual">⚪ Sin actividad</div>
            <div id="infoDetalle" style="font-size:0.85rem; color:#5b6e8c;"></div>
            <div id="datosPiscina" style="background:#eef2ff; padding:12px; border-radius:20px; margin-top:12px;"></div>
            
            <div id="botonesConsola" class="botones-consola"></div>
            
            <!-- Formulario de medición -->
            <div id="formularioMedicion" class="oculto">
                <div style="font-weight:600; margin-bottom:12px;">📝 Registrar medición</div>
                <div id="horaActualDisplay" style="font-size:0.8rem; margin-bottom:12px;">⏰ Hora: --:--</div>
                <input type="number" step="0.1" id="cloro" placeholder="Cloro (ppm) *">
                <input type="number" step="0.1" id="ph" placeholder="pH *">
                <input type="number" id="temp" placeholder="Temperatura (°C) *">
                <div id="productosContainer"></div>
                <button id="agregarProducto" class="btn-sm" style="background:#2c7a4d; width:auto;">➕ Añadir producto</button>
                <div style="margin: 12px 0;">
                    <input type="checkbox" id="urgenteCheckbox" style="width:auto; margin:0;">
                    <label for="urgenteCheckbox" style="margin-left:8px;">⚠️ Marcar como urgente</label>
                </div>
                <textarea id="notasTecnico" rows="3" placeholder="Notas internas..."></textarea>
                <button id="btnGuardarMedicion" class="btn-success">💾 Guardar medición</button>
                <button id="btnFinalizarActividad" class="btn-danger oculto" style="margin-top:12px;">🏁 Finalizar actividad</button>
            </div>
        </div>

        <button id="btnLogout" style="background:#475569; margin-top:16px;">🚪 Cerrar sesión</button>
    </div>
</div>

<script>
    // ========== CONSTANTES ==========
    const SUPABASE_URL = "https://vvdyofbapqttcvczokiw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MwuazhcxSJGc04eS2vttZA_SEcGjhVT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const DOMINIO = "@mipiscina.com";

    let currentUserId = null;
    let currentUserNombre = "";
    let jornadaActiva = null;
    let trabajoActivo = null;
    let tareaActiva = null;
    let desplazamientoActivo = null;
    let equipoActual = null;
    let productosTemp = [];
    let intervalHora = null;

    // ========== FUNCIONES AUXILIARES ==========
    function formatDate(iso) { return iso ? new Date(iso).toLocaleString() : '—'; }
    function getFechaActual() { return new Date().toISOString().slice(0,10); }
    function getHoraActual() { return new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }); }
    
    function actualizarHoraDisplay() {
        const el = document.getElementById('horaActualDisplay');
        if (el) el.innerHTML = `⏰ Hora del mantenimiento: ${getHoraActual()}`;
    }
    if (intervalHora) clearInterval(intervalHora);
    intervalHora = setInterval(actualizarHoraDisplay, 60000);

    // ========== LOGIN ==========
    async function hacerLogin() {
        const nick = document.getElementById('nick').value.trim();
        const password = document.getElementById('password').value;
        if (!nick || !password) { document.getElementById('errorMsg').innerText = "Introduce nick y contraseña"; return false; }
        const email = nick + DOMINIO;
        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email, password });
        if (authError) { document.getElementById('errorMsg').innerText = authError.message; return false; }
        const { data: perfil, error: perfilError } = await sb.from('perfiles').select('*').eq('id', authData.user.id).single();
        if (perfilError || !perfil) { await sb.auth.signOut(); document.getElementById('errorMsg').innerText = "Usuario sin perfil"; return false; }
        if (perfil.rol !== 'tecnico') { await sb.auth.signOut(); document.getElementById('errorMsg').innerText = "Acceso solo para técnicos"; return false; }
        currentUserId = authData.user.id;
        currentUserNombre = perfil.nombre || perfil.nick;
        return true;
    }

    // ========== CARGAR PIZARRA DE TRABAJO ==========
    async function cargarPizarraTrabajo() {
        if (!currentUserId || !jornadaActiva) return;
        
        document.getElementById('fechaPizarra').innerHTML = getFechaActual();
        
        // 1. Verificar si el técnico está en algún equipo
        const { data: miEquipo } = await sb
            .from('equipo_miembros')
            .select('equipo_id, equipos_trabajo!inner(nombre)')
            .eq('tecnico_id', currentUserId)
            .maybeSingle();
        
        const equipoId = miEquipo?.equipo_id;
        
        if (equipoId) {
            equipoActual = equipoId;
            document.getElementById('equipoInfo').classList.remove('oculto');
            document.getElementById('equipoNombre').innerHTML = miEquipo.equipos_trabajo.nombre;
            
            const { data: miembros } = await sb
                .from('equipo_miembros')
                .select('tecnico_id, perfiles!inner(nombre, nick)')
                .eq('equipo_id', equipoId);
            
            const nombres = miembros?.map(m => m.perfiles.nombre || m.perfiles.nick).join(', ') || '';
            document.getElementById('miembrosEquipo').innerHTML = `👥 Miembros: ${nombres}`;
        } else {
            equipoActual = null;
            document.getElementById('equipoInfo').classList.add('oculto');
        }
        
        // 2. Cargar tareas (individuales o del equipo)
        // Una tarea es visible si:
        // - es_equipo = false Y tecnico_id = currentUserId
        // - es_equipo = true Y equipo_id = equipoActual
        let query = sb.from('asignaciones_diarias')
            .select('*, piscina:piscina_id(id, nombre, direccion, localidad, telefono_contacto)')
            .eq('fecha', getFechaActual())
            .in('estado', ['PENDIENTE', 'EN_CURSO']);
        
        if (equipoActual) {
            // Ver tareas del equipo O tareas individuales suyas
            query = query.or(`and(es_equipo.eq.true,equipo_id.eq.${equipoActual}),and(es_equipo.eq.false,tecnico_id.eq.${currentUserId})`);
        } else {
            query = query.eq('tecnico_id', currentUserId).eq('es_equipo', false);
        }
        
        const { data: tareas, error } = await query;
        
        if (error) {
            console.error("Error cargando tareas:", error);
            return;
        }
        
        // Separar tarea en curso
        const tareaEnCurso = tareas?.find(t => t.estado === 'EN_CURSO');
        const tareasPendientes = tareas?.filter(t => t.estado === 'PENDIENTE') || [];
        
        // Obtener prioridades
        const prioridadMap = { 'GRAVE': 1, 'URGENTE': 2, 'ALTA': 1, 'MEDIA': 2, 'BAJA': 3, 'NORMAL': 3 };
        
        const tareasConPrioridad = await Promise.all(tareasPendientes.map(async (tarea) => {
            let prioridad = 4;
            if (tarea.tipo === 'URGENCIA' && tarea.urgencia_id) {
                const { data: urgencia } = await sb
                    .from('urgencias_programadas')
                    .select('nivel_urgencia')
                    .eq('id', tarea.urgencia_id)
                    .single();
                prioridad = prioridadMap[urgencia?.nivel_urgencia] || 3;
            } else if (tarea.tipo === 'RUTA') {
                prioridad = 4;
            }
            return { ...tarea, prioridad };
        }));
        
        tareasConPrioridad.sort((a, b) => a.prioridad - b.prioridad);
        
        renderizarTareasPendientes(tareasConPrioridad);
        
        if (tareaEnCurso) {
            tareaActiva = tareaEnCurso;
            mostrarTareaEnCurso(tareaEnCurso);
            if (tareaEnCurso.estado === 'EN_CURSO' && !trabajoActivo) {
                await iniciarActividadDesdeTarea(tareaEnCurso);
            }
        } else {
            document.getElementById('tareaEnCursoSection').classList.add('oculto');
            tareaActiva = null;
        }
    }
    
    function renderizarTareasPendientes(tareas) {
        const container = document.getElementById('tareasPendientesList');
        if (!tareas.length) {
            container.innerHTML = '<div style="padding:16px; text-align:center; color:#5b6e8c;">✅ No hay tareas pendientes</div>';
            return;
        }
        
        container.innerHTML = '';
        for (const tarea of tareas) {
            let prioridadClass = 'tarea-normal';
            let prioridadTexto = 'NORMAL';
            
            if (tarea.prioridad === 1) { prioridadClass = 'tarea-grave'; prioridadTexto = '🚨 GRAVE'; }
            else if (tarea.prioridad === 2) { prioridadClass = 'tarea-urgente'; prioridadTexto = '⚠️ URGENTE'; }
            else if (tarea.prioridad === 3) { prioridadClass = 'tarea-normal'; prioridadTexto = '✅ NORMAL'; }
            else { prioridadClass = 'tarea-baja'; prioridadTexto = '📋 MANTENIMIENTO'; }
            
            const div = document.createElement('div');
            div.className = `tarea-card ${prioridadClass}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <div>
                        <strong>🏊 ${tarea.piscina?.nombre || 'Cargando...'}</strong>
                        <span class="badge-prioridad ${prioridadClass.replace('tarea-', 'badge-')}">${prioridadTexto}</span>
                        ${tarea.es_equipo ? '<span style="background:#0284c7; color:white; padding:2px 8px; border-radius:20px; font-size:0.6rem; margin-left:8px;">👥 EQUIPO</span>' : ''}
                    </div>
                    <button class="btn-sm btn-success iniciar-tarea" data-tarea='${JSON.stringify(tarea)}' style="margin-top:5px;">▶ Iniciar</button>
                </div>
                <div style="font-size:0.75rem; color:#5b6e8c; margin-top:6px;">
                    📍 ${tarea.piscina?.direccion || ''} ${tarea.piscina?.localidad || ''}
                </div>
            `;
            container.appendChild(div);
        }
        
        document.querySelectorAll('.iniciar-tarea').forEach(btn => {
            btn.onclick = () => {
                const tarea = JSON.parse(btn.dataset.tarea);
                iniciarTarea(tarea);
            };
        });
    }
    
    function mostrarTareaEnCurso(tarea) {
        const container = document.getElementById('tareaEnCursoCard');
        const section = document.getElementById('tareaEnCursoSection');
        
        let prioridadClass = 'tarea-normal';
        if (tarea.prioridad === 1) prioridadClass = 'tarea-grave';
        else if (tarea.prioridad === 2) prioridadClass = 'tarea-urgente';
        
        container.className = `tarea-card ${prioridadClass}`;
        container.innerHTML = `
            <div>
                <strong>🏊 ${tarea.piscina?.nombre || 'Cargando...'}</strong>
                ${tarea.es_equipo ? '<span style="background:#0284c7; color:white; padding:2px 8px; border-radius:20px; font-size:0.6rem; margin-left:8px;">👥 EQUIPO</span>' : ''}
                <div style="font-size:0.75rem; color:#5b6e8c; margin-top:4px;">
                    📍 ${tarea.piscina?.direccion || ''} ${tarea.piscina?.localidad || ''}
                </div>
                <div style="font-size:0.7rem; margin-top:6px;">🕒 Iniciada: ${formatDate(tarea.iniciada_en || new Date())}</div>
            </div>
        `;
        section.classList.remove('oculto');
    }
    
    async function iniciarTarea(tarea) {
        if (trabajoActivo) {
            alert("⚠️ Ya tienes una actividad en curso. Finalízala primero.");
            return;
        }
        
        // Marcar tarea como EN_CURSO
        await sb.from('asignaciones_diarias')
            .update({ estado: 'EN_CURSO', iniciada_en: new Date().toISOString() })
            .eq('id', tarea.id);
        
        if (tarea.urgencia_id) {
            await sb.from('urgencias_programadas')
                .update({ estado: 'EN_CURSO' })
                .eq('id', tarea.urgencia_id);
        }
        
        tareaActiva = tarea;
        await cargarPizarraTrabajo();
        await iniciarActividadDesdeTarea(tarea);
    }
    
    async function iniciarActividadDesdeTarea(tarea) {
        const piscina = tarea.piscina;
        if (!piscina) return;
        
        const { data: trabajo, error } = await sb.from('trabajos_piscina').insert({
            jornada_id: jornadaActiva.id,
            piscina_id: piscina.id,
            tecnico_id: currentUserId,
            inicio: new Date().toISOString()
        }).select().single();
        
        if (error) { console.error("Error iniciando trabajo:", error); return; }
        
        trabajoActivo = trabajo;
        mostrarConsolaTrabajo(piscina);
        await cargarMedicionesDeJornadaActiva();
    }
    
    function mostrarConsolaTrabajo(piscina) {
        document.getElementById('consolaTrabajo').classList.remove('oculto');
        document.getElementById('datosPiscina').innerHTML = `
            <strong>🏊 ${piscina.nombre}</strong><br>
            📍 ${piscina.direccion || ''} ${piscina.localidad || ''}<br>
            📞 ${piscina.telefono_contacto || 'Sin teléfono'}
        `;
        actualizarBotonesConsola();
    }
    
    function actualizarBotonesConsola() {
        const botonesDiv = document.getElementById('botonesConsola');
        const estadoDiv = document.getElementById('estadoActual');
        const infoDetalle = document.getElementById('infoDetalle');
        const formularioMed = document.getElementById('formularioMedicion');
        
        botonesDiv.innerHTML = '';
        formularioMed.classList.add('oculto');
        
        if (desplazamientoActivo) {
            estadoDiv.innerHTML = `🚗 EN DESPLAZAMIENTO HACIA ${tareaActiva?.piscina?.nombre}`;
            const btnLlegada = document.createElement('button');
            btnLlegada.textContent = "📍 Llegada a piscina";
            btnLlegada.className = "btn-success";
            btnLlegada.onclick = llegadaPiscina;
            botonesDiv.appendChild(btnLlegada);
        } else if (trabajoActivo) {
            estadoDiv.innerHTML = `🏊 TRABAJANDO EN ${tareaActiva?.piscina?.nombre}`;
            formularioMed.classList.remove('oculto');
            actualizarHoraDisplay();
        } else {
            estadoDiv.innerHTML = `📍 EN PISCINA: ${tareaActiva?.piscina?.nombre}`;
            infoDetalle.innerHTML = `¿Qué quieres hacer?`;
            const btnDesp = document.createElement('button');
            btnDesp.textContent = "🚗 Iniciar desplazamiento";
            btnDesp.className = "btn-warning";
            btnDesp.onclick = iniciarDesplazamiento;
            const btnAct = document.createElement('button');
            btnAct.textContent = "🏊 Iniciar actividad";
            btnAct.className = "btn-success";
            btnAct.onclick = iniciarActividad;
            botonesDiv.appendChild(btnDesp);
            botonesDiv.appendChild(btnAct);
        }
    }
    
    async function iniciarDesplazamiento() {
        if (!jornadaActiva || !tareaActiva) return;
        
        const { data, error } = await sb.from('desplazamientos').insert({
            jornada_id: jornadaActiva.id,
            tecnico_id: currentUserId,
            piscina_destino_id: tareaActiva.piscina_id,
            inicio: new Date().toISOString()
        }).select();
        
        if (error) { alert(error.message); return; }
        desplazamientoActivo = data[0];
        actualizarBotonesConsola();
        alert(`🚗 Desplazamiento hacia ${tareaActiva.piscina?.nombre} iniciado`);
    }
    
    async function llegadaPiscina() {
        if (!desplazamientoActivo) return;
        
        await sb.from('desplazamientos').update({ fin: new Date().toISOString() }).eq('id', desplazamientoActivo.id);
        desplazamientoActivo = null;
        
        const { data: trabajo, error } = await sb.from('trabajos_piscina').insert({
            jornada_id: jornadaActiva.id,
            piscina_id: tareaActiva.piscina_id,
            tecnico_id: currentUserId,
            inicio: new Date().toISOString()
        }).select();
        
        if (error) { alert(error.message); return; }
        trabajoActivo = trabajo[0];
        actualizarBotonesConsola();
        alert("📍 Llegada registrada. Actividad iniciada.");
        await cargarMedicionesDeJornadaActiva();
    }
    
    async function iniciarActividad() {
        if (!jornadaActiva || !tareaActiva) return;
        
        const { data, error } = await sb.from('trabajos_piscina').insert({
            jornada_id: jornadaActiva.id,
            piscina_id: tareaActiva.piscina_id,
            tecnico_id: currentUserId,
            inicio: new Date().toISOString()
        }).select();
        
        if (error) { alert(error.message); return; }
        trabajoActivo = data[0];
        actualizarBotonesConsola();
        alert("🏊 Actividad iniciada");
        await cargarMedicionesDeJornadaActiva();
    }
    
    // ========== JORNADA ==========
    async function iniciarJornada() {
        if (jornadaActiva) return;
        const { data, error } = await sb.from('jornadas').insert({ tecnico_id: currentUserId, inicio: new Date().toISOString() }).select();
        if (error) { alert(error.message); return; }
        jornadaActiva = data[0];
        document.getElementById('estadoJornada').innerHTML = `✅ Jornada activa desde ${formatDate(jornadaActiva.inicio)}`;
        document.getElementById('estadoJornada').style.background = "#d4edda";
        document.getElementById('btnIniciarJornada').classList.add('oculto');
        document.getElementById('btnFinalizarJornada').classList.remove('oculto');
        await cargarPizarraTrabajo();
    }
    
    async function finalizarJornada() {
        if (!jornadaActiva) return;
        if (trabajoActivo) { alert("Finaliza la actividad actual primero"); return; }
        await sb.from('jornadas').update({ fin: new Date().toISOString() }).eq('id', jornadaActiva.id);
        jornadaActiva = null;
        document.getElementById('estadoJornada').innerHTML = "⚠️ Jornada no iniciada";
        document.getElementById('estadoJornada').style.background = "#f8d7da";
        document.getElementById('btnIniciarJornada').classList.remove('oculto');
        document.getElementById('btnFinalizarJornada').classList.add('oculto');
        location.reload();
    }
    
    async function finalizarActividad() {
        if (!trabajoActivo) return;
        
        // Marcar tarea como COMPLETADA
        if (tareaActiva) {
            await sb.from('asignaciones_diarias')
                .update({ 
                    estado: 'COMPLETADA', 
                    completada_en: new Date().toISOString(),
                    completada_por: currentUserId
                })
                .eq('id', tareaActiva.id);
            
            if (tareaActiva.urgencia_id) {
                await sb.from('urgencias_programadas')
                    .update({ estado: 'COMPLETADA', completada_en: new Date().toISOString() })
                    .eq('id', tareaActiva.urgencia_id);
            }
        }
        
        const observaciones = document.getElementById('notasTecnico').value.trim() || "Actividad finalizada";
        await sb.from('trabajos_piscina').update({ fin: new Date().toISOString(), observaciones }).eq('id', trabajoActivo.id);
        
        trabajoActivo = null;
        tareaActiva = null;
        desplazamientoActivo = null;
        
        document.getElementById('consolaTrabajo').classList.add('oculto');
        document.getElementById('formularioMedicion').classList.add('oculto');
        document.getElementById('cloro').value = '';
        document.getElementById('ph').value = '';
        document.getElementById('temp').value = '';
        document.getElementById('notasTecnico').value = '';
        productosTemp = [];
        renderizarProductos();
        
        await cargarPizarraTrabajo();
        alert("✅ Actividad finalizada");
    }
    
    // ========== MEDICIONES ==========
    async function cargarMedicionesDeJornadaActiva() {
        if (!jornadaActiva) return;
        const { data } = await sb.from('mediciones').select('*').eq('jornada_id', jornadaActiva.id).order('created_at', { ascending: false });
    }
    
    function renderizarProductos() {
        const container = document.getElementById('productosContainer');
        container.innerHTML = '';
        const productosPredefinidos = ["Cloro granulado", "Cloro pastillas", "pH+", "pH-", "Floculante", "Alguicida", "Aclarante", "Otro"];
        productosTemp.forEach((prod, idx) => {
            const div = document.createElement('div');
            div.className = 'row-flex';
            div.style.marginBottom = '8px';
            div.innerHTML = `
                <select class="prod-nombre" style="flex:2;">
                    ${productosPredefinidos.map(p => `<option value="${p}" ${prod.nombre === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
                <input type="number" step="0.01" class="prod-cantidad" placeholder="Cantidad" value="${prod.cantidad}" style="flex:1;">
                <select class="prod-unidad" style="flex:1;">
                    <option value="gramos" ${prod.unidad === 'gramos' ? 'selected' : ''}>gramos</option>
                    <option value="litros" ${prod.unidad === 'litros' ? 'selected' : ''}>litros</option>
                    <option value="pastillas" ${prod.unidad === 'pastillas' ? 'selected' : ''}>pastillas</option>
                </select>
                <button class="quitar-producto btn-sm btn-danger" style="width:auto;">✖</button>
            `;
            container.appendChild(div);
        });
    }
    
    document.getElementById('agregarProducto').onclick = () => {
        productosTemp.push({ nombre: "Cloro granulado", cantidad: 0, unidad: "gramos" });
        renderizarProductos();
    };
    
    async function guardarMedicion() {
        if (!trabajoActivo) { alert("No hay actividad activa"); return; }
        const cloro = parseFloat(document.getElementById('cloro').value);
        const ph = parseFloat(document.getElementById('ph').value);
        const temperatura = parseInt(document.getElementById('temp').value);
        if (isNaN(cloro) || isNaN(ph) || isNaN(temperatura)) { alert("Rellena cloro, pH y temperatura"); return; }
        
        const { data: medicion, error } = await sb.from('mediciones').insert({
            tecnico_id: currentUserId,
            piscina_id: trabajoActivo.piscina_id,
            jornada_id: jornadaActiva.id,
            cloro, ph, temperatura,
            observaciones: document.getElementById('notasTecnico').value,
            urgente: document.getElementById('urgenteCheckbox').checked
        }).select();
        
        if (error) { alert(error.message); return; }
        
        for (const prod of productosTemp) {
            if (prod.cantidad > 0) {
                await sb.from('productos_utilizados').insert({
                    medicion_id: medicion[0].id,
                    producto_nombre: prod.nombre,
                    cantidad: prod.cantidad,
                    unidad: prod.unidad
                });
            }
        }
        
        alert("✅ Medición guardada");
        document.getElementById('cloro').value = '';
        document.getElementById('ph').value = '';
        document.getElementById('temp').value = '';
        document.getElementById('notasTecnico').value = '';
        document.getElementById('urgenteCheckbox').checked = false;
        productosTemp = [];
        renderizarProductos();
    }
    
    // ========== EVENTOS ==========
    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            document.getElementById('nombreTecnico').innerHTML = `${currentUserNombre} 👋`;
            
            const { data: jornada } = await sb.from('jornadas').select('*').eq('tecnico_id', currentUserId).is('fin', null).maybeSingle();
            if (jornada) {
                jornadaActiva = jornada;
                document.getElementById('estadoJornada').innerHTML = `✅ Jornada activa desde ${formatDate(jornada.inicio)}`;
                document.getElementById('estadoJornada').style.background = "#d4edda";
                document.getElementById('btnIniciarJornada').classList.add('oculto');
                document.getElementById('btnFinalizarJornada').classList.remove('oculto');
                await cargarPizarraTrabajo();
            }
        }
    };
    
    document.getElementById('btnIniciarJornada').onclick = iniciarJornada;
    document.getElementById('btnFinalizarJornada').onclick = finalizarJornada;
    document.getElementById('btnRefrescarPizarra').onclick = cargarPizarraTrabajo;
    document.getElementById('btnCancelarTarea').onclick = async () => {
        if (tareaActiva && confirm("¿Cancelar esta tarea?")) {
            await sb.from('asignaciones_diarias').update({ estado: 'PENDIENTE' }).eq('id', tareaActiva.id);
            if (tareaActiva.urgencia_id) {
                await sb.from('urgencias_programadas').update({ estado: 'PENDIENTE' }).eq('id', tareaActiva.urgencia_id);
            }
            if (trabajoActivo) {
                await sb.from('trabajos_piscina').update({ fin: new Date().toISOString() }).eq('id', trabajoActivo.id);
                trabajoActivo = null;
            }
            tareaActiva = null;
            desplazamientoActivo = null;
            document.getElementById('consolaTrabajo').classList.add('oculto');
            await cargarPizarraTrabajo();
            alert("✅ Tarea cancelada");
        }
    };
    
    document.getElementById('btnGuardarMedicion').onclick = guardarMedicion;
    document.getElementById('btnFinalizarActividad').onclick = finalizarActividad;
    
    document.getElementById('btnLogout').onclick = async () => { await sb.auth.signOut(); location.reload(); };
    
    renderizarProductos();
</script>
</body>
</html>
