<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Técnico · Aqua Garden</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: auto; padding: 20px; background: #eef2ff; }
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #0066cc; color: white; font-weight: bold; border: none; cursor: pointer; }
        .oculto { display: none; }
        .estado-jornada { background: #f0f0f0; padding: 12px; border-radius: 24px; text-align: center; margin-bottom: 16px; }
        .activa { background: #d4edda; color: #155724; }
        .inactiva { background: #f8d7da; color: #721c24; }
        .producto-item { display: flex; gap: 8px; align-items: center; background: #f9f9f9; padding: 8px; border-radius: 40px; margin-bottom: 8px; }
        .quitar-producto { background: #c2410c; width: auto; padding: 8px 12px; margin: 0; }
        .medicion-card { background: #f8fafc; padding: 12px; border-radius: 16px; margin-bottom: 8px; border-left: 4px solid #0077b6; }
        .mensaje { margin-top: 12px; padding: 8px; border-radius: 20px; text-align: center; }
        .exito { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div id="loginPanel" class="card">
    <h2>🔐 Acceso Técnico</h2>
    <input type="text" id="nick" placeholder="Nick" value="tecnico">
    <input type="password" id="password" placeholder="Contraseña" value="123456">
    <button id="btnLogin">Iniciar sesión</button>
    <div id="errorMsg" style="color:red;"></div>
</div>

<div id="dashboardPanel" class="oculto">
    <div class="card">
        <h3>🕒 Jornada</h3>
        <div id="estadoJornada" class="estado-jornada inactiva">⚠️ Jornada no iniciada</div>
        <button id="btnIniciarJornada">🟢 Iniciar jornada</button>
        <button id="btnFinalizarJornada" class="oculto">🔴 Finalizar jornada</button>
    </div>
    <div id="medicionesContainer" class="card oculto">
        <h3>📝 Registrar medición</h3>
        <select id="piscinaSelect"></select>
        <input type="number" step="0.1" id="cloro" placeholder="Cloro (ppm)">
        <input type="number" step="0.1" id="ph" placeholder="pH">
        <input type="number" id="temp" placeholder="Temperatura (°C)">
        <textarea id="obs" rows="2" placeholder="Observaciones"></textarea>
        <div id="productosContainer"></div>
        <button id="agregarProducto" style="background:#2c7a4d;">➕ Añadir producto</button>
        <button id="btnGuardar">💾 Guardar medición</button>
        <div id="mensaje" class="mensaje"></div>
    </div>
    <div class="card">
        <h3>📜 Últimas 4 mediciones</h3>
        <div id="listaMediciones"></div>
    </div>
    <button id="btnLogout" style="background:#c2410c; margin-top:20px;">🚪 Cerrar sesión</button>
</div>

<script>
    const SUPABASE_URL = "https://vvdyofbapqttcvczokiw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MwuazhcxSJGc04eS2vttZA_SEcGjhVT";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const DOMINIO = "@mipiscina.com";

    let currentUserId = null;
    let jornadaActiva = null;
    let productosTemp = [];

    async function hacerLogin() {
        const nick = document.getElementById('nick').value.trim();
        const password = document.getElementById('password').value;
        if (!nick || !password) { 
            document.getElementById('errorMsg').innerText = "Introduce nick y contraseña"; 
            return false; 
        }
        const email = nick + DOMINIO;
        const { data: authData, error: authError } = await sb.auth.signInWithPassword({ email, password });
        if (authError) { 
            document.getElementById('errorMsg').innerText = authError.message; 
            return false; 
        }
        const { data: perfil, error: perfilError } = await sb.from('perfiles').select('*').eq('id', authData.user.id).single();
        if (perfilError || !perfil) { 
            await sb.auth.signOut(); 
            document.getElementById('errorMsg').innerText = "Usuario sin perfil"; 
            return false; 
        }
        if (perfil.rol !== 'tecnico') { 
            await sb.auth.signOut(); 
            document.getElementById('errorMsg').innerText = "Acceso solo para técnicos"; 
            return false; 
        }
        currentUserId = authData.user.id;
        return true;
    }

    document.getElementById('btnLogin').onclick = async () => {
        if (await hacerLogin()) {
            document.getElementById('loginPanel').classList.add('oculto');
            document.getElementById('dashboardPanel').classList.remove('oculto');
            await cargarPiscinas();
            await cargarJornadaActiva();
            await cargarUltimasMediciones();
            actualizarUIJornada();
        }
    };

    async function cargarPiscinas() {
        const { data } = await sb.from('piscinas').select('*').order('nombre');
        const select = document.getElementById('piscinaSelect');
        select.innerHTML = '<option value="">Selecciona piscina</option>';
        if (data) data.forEach(p => { 
            const opt = document.createElement('option'); 
            opt.value = p.id; 
            opt.textContent = p.nombre; 
            select.appendChild(opt); 
        });
    }

    async function cargarJornadaActiva() {
        const { data } = await sb.from('jornadas').select('*').eq('tecnico_id', currentUserId).is('fin', null).maybeSingle();
        jornadaActiva = data || null;
        actualizarUIJornada();
    }

    function actualizarUIJornada() {
        const estadoDiv = document.getElementById('estadoJornada');
        const btnIniciar = document.getElementById('btnIniciarJornada');
        const btnFinalizar = document.getElementById('btnFinalizarJornada');
        const medicionesContainer = document.getElementById('medicionesContainer');
        if (jornadaActiva) {
            estadoDiv.innerHTML = `✅ Jornada activa desde ${new Date(jornadaActiva.inicio).toLocaleString()}`;
            estadoDiv.className = "estado-jornada activa";
            btnIniciar.classList.add('oculto');
            btnFinalizar.classList.remove('oculto');
            medicionesContainer.classList.remove('oculto');
        } else {
            estadoDiv.innerHTML = "⚠️ Jornada no iniciada";
            estadoDiv.className = "estado-jornada inactiva";
            btnIniciar.classList.remove('oculto');
            btnFinalizar.classList.add('oculto');
            medicionesContainer.classList.add('oculto');
        }
    }

    document.getElementById('btnIniciarJornada').onclick = async () => {
        if (jornadaActiva) return;
        const { data, error } = await sb.from('jornadas').insert({ tecnico_id: currentUserId, inicio: new Date().toISOString() }).select();
        if (error) { 
            document.getElementById('mensaje').innerHTML = `<span class="error">❌ ${error.message}</span>`; 
            return; 
        }
        jornadaActiva = data[0];
        actualizarUIJornada();
        document.getElementById('mensaje').innerHTML = '<span class="exito">✅ Jornada iniciada</span>';
        setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
    };

    document.getElementById('btnFinalizarJornada').onclick = async () => {
        if (!jornadaActiva) return;
        const { error } = await sb.from('jornadas').update({ fin: new Date().toISOString() }).eq('id', jornadaActiva.id);
        if (error) { 
            document.getElementById('mensaje').innerHTML = `<span class="error">❌ ${error.message}</span>`; 
            return; 
        }
        jornadaActiva = null;
        actualizarUIJornada();
        document.getElementById('mensaje').innerHTML = '<span class="exito">✅ Jornada finalizada</span>';
        setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
        await cargarUltimasMediciones();
    };

    function renderizarProductos() {
        const contenedor = document.getElementById('productosContainer');
        contenedor.innerHTML = '';
        productosTemp.forEach((prod, idx) => {
            const div = document.createElement('div');
            div.className = 'producto-item';
            div.innerHTML = `
                <input type="text" class="prod-nombre" placeholder="Producto" value="${prod.nombre}">
                <input type="number" step="0.01" class="prod-cantidad" placeholder="Cantidad" value="${prod.cantidad}">
                <select class="prod-unidad">
                    <option value="gramos" ${prod.unidad==='gramos'?'selected':''}>gramos</option>
                    <option value="pastillas" ${prod.unidad==='pastillas'?'selected':''}>pastillas</option>
                    <option value="litros" ${prod.unidad==='litros'?'selected':''}>litros</option>
                    <option value="mililitros" ${prod.unidad==='mililitros'?'selected':''}>mililitros</option>
                </select>
                <button class="quitar-producto" data-idx="${idx}">✖</button>
            `;
            contenedor.appendChild(div);
        });
        document.querySelectorAll('.prod-nombre').forEach((inp, i) => inp.addEventListener('change', (e) => productosTemp[i].nombre = e.target.value));
        document.querySelectorAll('.prod-cantidad').forEach((inp, i) => inp.addEventListener('input', (e) => productosTemp[i].cantidad = parseFloat(e.target.value) || 0));
        document.querySelectorAll('.prod-unidad').forEach((sel, i) => sel.addEventListener('change', (e) => productosTemp[i].unidad = e.target.value));
        document.querySelectorAll('.quitar-producto').forEach(btn => btn.addEventListener('click', (e) => { productosTemp.splice(parseInt(e.target.dataset.idx), 1); renderizarProductos(); }));
    }

    document.getElementById('agregarProducto').onclick = () => { 
        productosTemp.push({ nombre: "Cloro", cantidad: 0, unidad: "gramos" }); 
        renderizarProductos(); 
    };

    document.getElementById('btnGuardar').onclick = async () => {
        if (!jornadaActiva) { 
            document.getElementById('mensaje').innerHTML = '<span class="error">⚠️ Inicia jornada primero</span>';
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
            return; 
        }
        const piscinaId = document.getElementById('piscinaSelect').value;
        const cloro = parseFloat(document.getElementById('cloro').value);
        const ph = parseFloat(document.getElementById('ph').value);
        const temperatura = parseInt(document.getElementById('temp').value);
        const observaciones = document.getElementById('obs').value;
        if (!piscinaId || isNaN(cloro) || isNaN(ph) || isNaN(temperatura)) { 
            document.getElementById('mensaje').innerHTML = '<span class="error">⚠️ Completa todos los campos</span>';
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
            return; 
        }
        
        const { data: medicion, error: errMed } = await sb.from('mediciones').insert({
            tecnico_id: currentUserId, 
            piscina_id: piscinaId, 
            jornada_id: jornadaActiva.id,
            cloro, ph, temperatura, observaciones
        }).select();
        if (errMed) { 
            document.getElementById('mensaje').innerHTML = `<span class="error">❌ ${errMed.message}</span>`; 
            return; 
        }
        
        const medicionId = medicion[0].id;
        for (const prod of productosTemp) {
            if (prod.cantidad) await sb.from('productos_utilizados').insert({ 
                medicion_id: medicionId, 
                producto_nombre: prod.nombre, 
                cantidad: prod.cantidad, 
                unidad: prod.unidad 
            });
        }
        
        document.getElementById('mensaje').innerHTML = '<span class="exito">✅ Medición guardada</span>';
        document.getElementById('cloro').value = ''; 
        document.getElementById('ph').value = ''; 
        document.getElementById('temp').value = ''; 
        document.getElementById('obs').value = '';
        productosTemp = []; 
        renderizarProductos();
        setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
        await cargarUltimasMediciones();
    };

    async function cargarUltimasMediciones() {
        const contenedor = document.getElementById('listaMediciones');
        contenedor.innerHTML = '<div style="text-align:center; padding:10px;">Cargando...</div>';
        
        // Consulta corregida: sin usar * con relaciones
        const { data, error } = await sb
            .from('mediciones')
            .select('id, cloro, ph, temperatura, observaciones, created_at, piscina_id')
            .eq('tecnico_id', currentUserId)
            .order('created_at', { ascending: false })
            .limit(4);
        
        if (error) { 
            console.error(error);
            contenedor.innerHTML = `<div class="medicion-card" style="color:red;">Error: ${error.message}</div>`;
            return;
        }
        
        if (!data || data.length === 0) { 
            contenedor.innerHTML = '<div class="medicion-card">No hay mediciones registradas</div>';
            return;
        }
        
        // Obtener nombres de piscinas
        const piscinasIds = [...new Set(data.map(m => m.piscina_id))];
        const { data: piscinas } = await sb.from('piscinas').select('id, nombre').in('id', piscinasIds);
        const piscinasMap = {};
        if (piscinas) piscinas.forEach(p => piscinasMap[p.id] = p.nombre);
        
        contenedor.innerHTML = '';
        for (const m of data) {
            const card = document.createElement('div');
            card.className = 'medicion-card';
            card.innerHTML = `
                <strong>🏊 ${piscinasMap[m.piscina_id] || 'Piscina'}</strong><br>
                🧪 Cloro: ${m.cloro} ppm | ⚗️ pH: ${m.ph} | 🌡️ ${m.temperatura}°C<br>
                📝 ${m.observaciones || 'Sin observaciones'}<br>
                <small>${new Date(m.created_at).toLocaleString()}</small>
            `;
            contenedor.appendChild(card);
        }
    }

    document.getElementById('btnLogout').onclick = async () => { 
        await sb.auth.signOut(); 
        location.reload(); 
    };
</script>
</body>
</html>
